auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: socketrelay
    command: socketrelay.request.create
    commandVersion: 1.0.0
    purpose: request_lifecycle
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        payloadValidationCheck: pass_or_fail
    dataClassesAccessed:
      - socketrelay_request_metadata
      - request_lifecycle_metadata
    targetContext:
      workspaceId: workspace_identifier
      requestId: request_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: socketrelay
    command: socketrelay.fulfillment.claim
    commandVersion: 1.0.0
    purpose: fulfillment_lifecycle
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        claimabilityCheck: pass_or_fail
        ownerSeparationCheck: pass_or_fail
    dataClassesAccessed:
      - fulfillment_claim_metadata
      - request_status_metadata
    targetContext:
      workspaceId: workspace_identifier
      requestId: request_identifier
      fulfillmentId: fulfillment_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: socketrelay
    command: socketrelay.fulfillment.message.send
    commandVersion: 1.0.0
    purpose: fulfillment_communication
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        participantMembershipCheck: pass_or_fail
        moderationCheck: pass_or_fail
    dataClassesAccessed:
      - fulfillment_message_metadata
      - participant_membership_metadata
    targetContext:
      workspaceId: workspace_identifier
      fulfillmentId: fulfillment_identifier
      messageId: message_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class
