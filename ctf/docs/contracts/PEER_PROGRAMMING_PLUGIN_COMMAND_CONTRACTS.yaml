contracts:
  - pluginId: peer-programming
    command: cohort.weekly.select
    version: 1.0.0
    description: Select weekly active users (login within the last 7 days) and form cohorts with target size of 5 members.
    inputSchema:
      workspaceId:
        type: string
        required: true
      weekKey:
        type: string
        required: true
      activityWindowDays:
        type: integer
        required: true
      targetCohortSize:
        type: integer
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      selectionRunId:
        type: string
      selectedUserCount:
        type: integer
      cohortCount:
        type: integer
      status:
        type: string
    dataAccess:
      - canonical_user_profile
      - auth_login_activity
      - peer_programming_cohorts
      - peer_programming_cohort_memberships
      - peer_programming_command_idempotency
    purpose: cohort_assignment
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: peer-programming
    command: cohort.assignment.notify
    version: 1.0.0
    description: Send in-app notifications for users assigned to weekly peer-programming cohorts.
    inputSchema:
      selectionRunId:
        type: string
        required: true
      cohortId:
        type: string
        required: true
      notificationTemplateId:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      notificationBatchId:
        type: string
      deliveredCount:
        type: integer
      failedCount:
        type: integer
      status:
        type: string
    dataAccess:
      - peer_programming_cohort_memberships
      - peer_programming_assignment_notifications
      - notification_delivery_log
      - peer_programming_command_idempotency
    purpose: assignment_notification
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: peer-programming
    command: cohort.fallback.open
    version: 1.0.0
    description: Open fallback cohort mode when fewer than 2 cohort members show for an active session window.
    inputSchema:
      cohortId:
        type: string
        required: true
      weekKey:
        type: string
        required: true
      observedMemberCount:
        type: integer
        required: true
      fallbackReason:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      fallbackActivationId:
        type: string
      roomMode:
        type: string
      activatedAt:
        type: string
      status:
        type: string
    dataAccess:
      - peer_programming_cohorts
      - peer_programming_rooms
      - peer_programming_room_presence
      - peer_programming_command_idempotency
    purpose: cohort_resilience
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: peer-programming
    command: room.state.get
    version: 1.0.0
    description: Retrieve current cohort room state including weekly topic guidance, participation summary, and fallback mode.
    inputSchema:
      roomId:
        type: string
        required: true
      weekKey:
        type: string
        required: true
      viewerTier:
        type: string
        required: true
        enum:
          - cohort_member
          - authenticated_audience
          - unauthenticated_audience
    outputSchema:
      roomId:
        type: string
      topicGuidance:
        type: object
      fallbackOpen:
        type: boolean
      participationSummary:
        type: object
      threadCounts:
        type: object
    dataAccess:
      - peer_programming_rooms
      - peer_programming_topic_guidance
      - peer_programming_cohort_memberships
      - peer_programming_threads
      - peer_programming_thread_replies
    purpose: room_experience
    retentionClass: derived_medium_lived
    idempotency: true

  - pluginId: peer-programming
    command: thread.post.create
    version: 1.0.0
    description: Create an async text-first root post in a cohort room timeline.
    inputSchema:
      roomId:
        type: string
        required: true
      authorUserId:
        type: string
        required: true
      body:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      threadId:
        type: string
      createdAt:
        type: string
      status:
        type: string
    dataAccess:
      - peer_programming_rooms
      - peer_programming_cohort_memberships
      - peer_programming_threads
      - peer_programming_command_idempotency
    purpose: async_collaboration
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: peer-programming
    command: thread.reply.create
    version: 1.0.0
    description: Create a threaded reply for an existing room thread.
    inputSchema:
      roomId:
        type: string
        required: true
      threadId:
        type: string
        required: true
      authorUserId:
        type: string
        required: true
      body:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      replyId:
        type: string
      createdAt:
        type: string
      status:
        type: string
    dataAccess:
      - peer_programming_threads
      - peer_programming_thread_replies
      - peer_programming_cohort_memberships
      - peer_programming_command_idempotency
    purpose: async_collaboration
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: peer-programming
    command: thread.list
    version: 1.0.0
    description: List room threads and replies with tier-aware visibility for 24/7 persistent conversation history.
    inputSchema:
      roomId:
        type: string
        required: true
      cursor:
        type: string
        required: false
      limit:
        type: integer
        required: false
      viewerTier:
        type: string
        required: true
        enum:
          - cohort_member
          - authenticated_audience
          - unauthenticated_audience
    outputSchema:
      threads:
        type: array
      nextCursor:
        type: string
      persistenceWindow:
        type: string
    dataAccess:
      - peer_programming_threads
      - peer_programming_thread_replies
      - peer_programming_rooms
      - peer_programming_cohort_memberships
    purpose: room_experience
    retentionClass: derived_medium_lived
    idempotency: true

  - pluginId: peer-programming
    command: participation.tier.resolve
    version: 1.0.0
    description: Resolve the viewer participation tier for cohort member, authenticated audience, or unauthenticated audience policies.
    inputSchema:
      roomId:
        type: string
        required: true
      userId:
        type: string
        required: false
      authState:
        type: string
        required: true
        enum:
          - authenticated
          - unauthenticated
    outputSchema:
      tier:
        type: string
      allowedActions:
        type: array
      reasonCode:
        type: string
    dataAccess:
      - peer_programming_cohort_memberships
      - peer_programming_rooms
      - canonical_user_profile
    purpose: access_tiering
    retentionClass: derived_medium_lived
    idempotency: true

  - pluginId: peer-programming
    command: feedback.submit
    version: 1.0.0
    description: Submit structured room feedback for weekly iteration loop analysis.
    inputSchema:
      roomId:
        type: string
        required: true
      weekKey:
        type: string
        required: true
      submitterUserId:
        type: string
        required: false
      issueCategory:
        type: string
        required: true
      suggestion:
        type: string
        required: true
      releaseSurface:
        type: string
        required: true
        enum:
          - web
          - android
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      feedbackId:
        type: string
      status:
        type: string
      createdAt:
        type: string
    dataAccess:
      - peer_programming_feedback
      - peer_programming_rooms
      - peer_programming_command_idempotency
    purpose: quality_iteration
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: peer-programming
    command: admin.topic-guidance.set
    version: 1.0.0
    description: Set or update admin-defined weekly topic guidance for cohort rooms.
    inputSchema:
      weekKey:
        type: string
        required: true
      guidanceTitle:
        type: string
        required: true
      guidanceBody:
        type: string
        required: true
      publicationStatus:
        type: string
        required: true
        enum:
          - draft
          - published
      revisionNote:
        type: string
        required: false
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      topicGuidanceId:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    dataAccess:
      - peer_programming_topic_guidance
      - peer_programming_admin_actions
      - peer_programming_command_idempotency
    purpose: topic_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: peer-programming
    command: admin.topic-guidance.get
    version: 1.0.0
    description: Retrieve admin-defined weekly topic guidance and revision metadata.
    inputSchema:
      weekKey:
        type: string
        required: true
      includeRevisionHistory:
        type: boolean
        required: false
    outputSchema:
      topicGuidance:
        type: object
      revisionHistory:
        type: array
      publicationStatus:
        type: string
    dataAccess:
      - peer_programming_topic_guidance
      - peer_programming_admin_actions
    purpose: topic_governance
    retentionClass: derived_medium_lived
    idempotency: true
