policies:
  - pluginId: feed
    command: feed.timeline.fetch
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      feedVisibilityPolicy: required
    consentRequirements:
      scopes:
        - feed_consumption
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - cross_workspace_access

  - pluginId: feed
    command: feed.item.read.mark
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnReadState: true
    consentRequirements:
      scopes:
        - feed_consumption
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - actor_not_profile_owner

  - pluginId: feed
    command: feed.item.dismiss
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnDismissState: true
      mandatoryDismissGuard: required
    consentRequirements:
      scopes:
        - feed_consumption
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - actor_not_profile_owner
      - target_item_mandatory

  - pluginId: feed
    command: feed.announcement.render-mode.update
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      adminRouteGuard: required
      renderModeValidation: required
    consentRequirements:
      scopes:
        - feed_admin_governance
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - csrf_validation_failed
      - invalid_render_mode

  - pluginId: feed
    command: feed.admin.config.update
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      adminRouteGuard: required
      configValidation: required
    consentRequirements:
      scopes:
        - feed_admin_governance
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - csrf_validation_failed
      - invalid_render_config

  - pluginId: feed
    command: feed.membership.event.emit
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      eventPayloadValidation: required
      membershipProjectionAudit: required
    consentRequirements:
      scopes:
        - feed_admin_governance
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - csrf_validation_failed
      - invalid_membership_event_payload
