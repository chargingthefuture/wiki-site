policies:
  # ─── Timeline (unified) ────────────────────────────────────────────────
  - pluginId: feed
    command: feed.timeline.fetch
    version: 2.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      feedVisibilityPolicy: required
      channelFilter: optional
    consentRequirements:
      scopes:
        - feed_consumption
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - cross_workspace_access

  - pluginId: feed
    command: feed.item.read.mark
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnReadState: true
    consentRequirements:
      scopes:
        - feed_consumption
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - actor_not_profile_owner

  - pluginId: feed
    command: feed.item.dismiss
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnDismissState: true
      mandatoryDismissGuard: required
    consentRequirements:
      scopes:
        - feed_consumption
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - actor_not_profile_owner
      - target_item_mandatory

