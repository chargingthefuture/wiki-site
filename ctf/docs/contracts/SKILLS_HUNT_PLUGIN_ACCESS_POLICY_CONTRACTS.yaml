policies:
  - pluginId: skills-hunt
    command: skills-hunt.round.create
    version: 1.0.0
    requiredRoles:
      - admin
      - operations
    attributePolicies:
      tenancy: same_workspace
      validRoundWindow: required
      scoringConfigBounds: enforced
    consentRequirements:
      scopes:
        - skills_hunt_admin
      fallbackLawfulBasis: legitimate_interest
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - invalid_round_window
      - invalid_scoring_config

  - pluginId: skills-hunt
    command: skills-hunt.round.update
    version: 1.0.0
    requiredRoles:
      - admin
      - operations
    attributePolicies:
      tenancy: same_workspace
      roundExists: required
      statusTransitionRules: enforced
    consentRequirements:
      scopes:
        - skills_hunt_admin
      fallbackLawfulBasis: legitimate_interest
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - round_not_found
      - invalid_status_transition

  - pluginId: skills-hunt
    command: skills-hunt.round.list
    version: 1.0.0
    requiredRoles:
      - member
      - moderator
      - admin
    attributePolicies:
      tenancy: same_workspace
      roundVisibilityPolicy: enforced
    consentRequirements:
      scopes: []
      fallbackLawfulBasis: contract_performance
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - cross_workspace_access

  - pluginId: skills-hunt
    command: skills-hunt.submission.create
    version: 1.0.0
    requiredRoles:
      - member
      - contributor
    attributePolicies:
      tenancy: same_workspace
      activeRoundRequired: true
      rollingSubmissionLimit: enforced
      duplicateSignatureCheck: required
      inputValidation: strict
    consentRequirements:
      scopes:
        - skills_hunt_submission
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - round_not_active
      - submission_limit_exceeded
      - duplicate_submission_detected
      - invalid_input_payload

  - pluginId: skills-hunt
    command: skills-hunt.submission.list
    version: 1.0.0
    requiredRoles:
      - member
      - contributor
      - moderator
      - admin
    attributePolicies:
      tenancy: same_workspace
      ownershipScopeOrModerationRole: required
    consentRequirements:
      scopes:
        - skills_hunt_submission_read
      fallbackLawfulBasis: contract_performance
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - insufficient_role
      - cross_workspace_access
      - unauthorized_scope

  - pluginId: skills-hunt
    command: skills-hunt.submission.review
    version: 1.0.0
    requiredRoles:
      - moderator
      - admin
    attributePolicies:
      tenancy: same_workspace
      reviewActionAllowed: true
      scoringPolicyEnforced: true
      rejectionRateGuard: required
    consentRequirements:
