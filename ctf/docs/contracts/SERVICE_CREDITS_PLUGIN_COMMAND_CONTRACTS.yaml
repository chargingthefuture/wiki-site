contracts:
  - pluginId: service-credits
    command: wallet.create
    version: 1.0.0
    description: Create or activate a Service Credits wallet bound to a canonical user profile.
    inputSchema:
      userId:
        type: string
        required: true
      workspaceId:
        type: string
        required: true
      walletType:
        type: string
        required: true
        enum:
          - personal
          - treasury
          - escrow
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      walletId:
        type: string
      status:
        type: string
      createdAt:
        type: string
    dataAccess:
      - canonical_user_profile
      - service_credits_user_extension
      - service_credits_wallets
      - service_credits_command_idempotency
    purpose: wallet_lifecycle
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: service-credits
    command: wallet.balance.get
    version: 1.0.0
    description: Retrieve current available, held, and total Service Credits wallet balance.
    inputSchema:
      walletId:
        type: string
        required: true
      asOf:
        type: string
        required: false
    outputSchema:
      walletId:
        type: string
      availableBalance:
        type: number
      heldBalance:
        type: number
      totalBalance:
        type: number
      asOf:
        type: string
    dataAccess:
      - service_credits_wallets
      - service_credits_transfers
      - service_credits_escrow_holds
    purpose: balance_visibility
    retentionClass: derived_medium_lived
    idempotency: true

  - pluginId: service-credits
    command: transfer.create
    version: 1.0.0
    description: Create a credit transfer between source and destination wallets under plugin-path constraints.
    inputSchema:
      sourceWalletId:
        type: string
        required: true
      destinationWalletId:
        type: string
        required: true
      amount:
        type: number
        required: true
      reasonCode:
        type: string
        required: true
      originPlugin:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      transferId:
        type: string
      status:
        type: string
      ledgerReference:
        type: string
      createdAt:
        type: string
    dataAccess:
      - service_credits_wallets
      - service_credits_transfers
      - service_credits_command_idempotency
      - service_credits_adapter_outbox
    purpose: value_transfer
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: service-credits
    command: escrow.hold.create
    version: 1.0.0
    description: Hold credits in escrow for cross-plugin transactional commitments.
    inputSchema:
      escrowId:
        type: string
        required: true
      sourceWalletId:
        type: string
        required: true
      amount:
        type: number
        required: true
      originPlugin:
        type: string
        required: true
      releasePolicy:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      escrowId:
        type: string
      holdStatus:
        type: string
      heldAmount:
        type: number
      createdAt:
        type: string
    dataAccess:
      - service_credits_wallets
      - service_credits_escrow_holds
      - service_credits_command_idempotency
      - service_credits_adapter_outbox
    purpose: escrow_management
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: service-credits
    command: escrow.release
    version: 1.0.0
    description: Release escrowed credits to a destination wallet when release conditions are satisfied.
    inputSchema:
      escrowId:
        type: string
        required: true
      destinationWalletId:
        type: string
        required: true
      releaseReason:
        type: string
        required: true
      originPlugin:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      escrowId:
        type: string
      releaseStatus:
        type: string
      transferId:
        type: string
      releasedAt:
        type: string
    dataAccess:
      - service_credits_escrow_holds
      - service_credits_transfers
      - service_credits_wallets
      - service_credits_command_idempotency
      - service_credits_adapter_outbox
    purpose: escrow_management
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: service-credits
    command: escrow.refund
    version: 1.0.0
    description: Refund escrowed credits to the originating wallet when release conditions fail.
    inputSchema:
      escrowId:
        type: string
        required: true
      refundReason:
        type: string
        required: true
      originPlugin:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      escrowId:
        type: string
      refundStatus:
        type: string
      refundedAt:
        type: string
    dataAccess:
      - service_credits_escrow_holds
      - service_credits_transfers
      - service_credits_wallets
      - service_credits_command_idempotency
      - service_credits_adapter_outbox
    purpose: escrow_management
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: service-credits
    command: governance.mint.grant
    version: 1.0.0
    description: Grant newly issued service credits under governance policy controls.
    inputSchema:
      targetWalletId:
        type: string
        required: true
      amount:
        type: number
        required: true
      grantReason:
        type: string
        required: true
      governanceTicketId:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      governanceEventId:
        type: string
      mintStatus:
        type: string
      mintedAt:
        type: string
    dataAccess:
      - service_credits_wallets
      - service_credits_governance_events
      - service_credits_command_idempotency
      - service_credits_adapter_outbox
    purpose: governance_monetary_control
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: service-credits
    command: governance.burn
    version: 1.0.0
    description: Burn service credits from a wallet under governance policy controls.
    inputSchema:
      targetWalletId:
        type: string
        required: true
      amount:
        type: number
        required: true
      burnReason:
        type: string
        required: true
      governanceTicketId:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      governanceEventId:
        type: string
      burnStatus:
        type: string
      burnedAt:
        type: string
    dataAccess:
      - service_credits_wallets
      - service_credits_governance_events
      - service_credits_command_idempotency
      - service_credits_adapter_outbox
    purpose: governance_monetary_control
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: service-credits
    command: treasury.fee.collect
    version: 1.0.0
    description: Collect treasury fees from transactional flows according to policy-configured fee rules.
    inputSchema:
      sourceWalletId:
        type: string
        required: true
      treasuryWalletId:
        type: string
        required: true
      amount:
        type: number
        required: true
      feeReasonCode:
        type: string
        required: true
      originPlugin:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      treasuryEventId:
        type: string
      transferId:
        type: string
      collectionStatus:
        type: string
      collectedAt:
        type: string
    dataAccess:
      - service_credits_wallets
      - service_credits_treasury_events
      - service_credits_transfers
      - service_credits_command_idempotency
      - service_credits_adapter_outbox
    purpose: treasury_operations
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: service-credits
    command: dispute.adjustment.apply
    version: 1.0.0
    description: Apply a dispute-authorized credit adjustment between involved wallets.
    inputSchema:
      disputeCaseId:
        type: string
        required: true
      sourceWalletId:
        type: string
        required: true
      destinationWalletId:
        type: string
        required: true
      amount:
        type: number
        required: true
      adjustmentReason:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      adjustmentId:
        type: string
      transferId:
        type: string
      adjustmentStatus:
        type: string
      appliedAt:
        type: string
    dataAccess:
      - service_credits_dispute_adjustments
      - service_credits_wallets
      - service_credits_transfers
      - service_credits_command_idempotency
      - service_credits_adapter_outbox
    purpose: dispute_resolution
    retentionClass: audit_long_lived
    idempotency: true
