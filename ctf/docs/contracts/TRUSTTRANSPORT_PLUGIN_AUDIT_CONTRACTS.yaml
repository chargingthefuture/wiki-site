auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: trusttransport
    command: trusttransport.request.create
    commandVersion: 1.0.0
    purpose: marketplace_request_creation
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        modeValidationCheck: pass_or_fail
        regionCheck: pass_or_fail
    dataClassesAccessed:
      - transport_request_metadata
      - route_summary_metadata
    targetContext:
      workspaceId: workspace_identifier
      requestId: request_identifier
      mode: ride_or_package_or_food
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: trusttransport
    command: trusttransport.offer.accept
    commandVersion: 1.0.0
    purpose: marketplace_fulfillment_start
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        offerEligibilityCheck: pass_or_fail
        requestOwnershipCheck: pass_or_fail
    dataClassesAccessed:
      - offer_metadata
      - trip_initialization_metadata
    targetContext:
      workspaceId: workspace_identifier
      offerId: offer_identifier
      tripId: trip_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: trusttransport
    command: trusttransport.trip.status.update
    commandVersion: 1.0.0
    purpose: lifecycle_transition
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        transitionMatrixCheck: pass_or_fail
        participantAuthorizationCheck: pass_or_fail
    dataClassesAccessed:
      - trip_status_metadata
      - proof_artifact_metadata
    targetContext:
      workspaceId: workspace_identifier
      tripId: trip_identifier
      nextStatus: lifecycle_state
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: trusttransport
    command: trusttransport.payout.request
    commandVersion: 1.0.0
    purpose: provider_payouts
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        ledgerOwnershipCheck: pass_or_fail
        availableBalanceCheck: pass_or_fail
    dataClassesAccessed:
      - payout_request_metadata
      - earnings_ledger_metadata
    targetContext:
      workspaceId: workspace_identifier
      providerId: provider_identifier
      payoutRequestId: payout_request_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class
