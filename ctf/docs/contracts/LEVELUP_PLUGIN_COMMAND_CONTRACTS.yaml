contracts:
  - pluginId: levelup
    command: cohort.create
    version: 1.0.0
    description: Create a LevelUp training cohort with curriculum, milestones, and policy controls.
    inputSchema:
      idempotencyKey:
        type: string
        required: true
      title:
        type: string
        required: true
      track:
        type: string
        required: true
      seats:
        type: number
        required: true
      requiredCredits:
        type: number
        required: true
      milestones:
        type: array
        required: false
    outputSchema:
      cohortId:
        type: string
    dataAccess:
      - levelup_cohorts
      - levelup_curriculum_items
      - levelup_milestones
      - levelup_command_idempotency
    purpose: training_cohort_management
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: levelup
    command: cohort.list
    version: 1.0.0
    description: List cohorts with status, track, and date filters.
    inputSchema:
      track:
        type: string
        required: false
      status:
        type: string
        required: false
      startDate:
        type: string
        required: false
    outputSchema:
      cohorts:
        type: array
    dataAccess:
      - levelup_cohorts
      - levelup_enrollments
    purpose: training_marketplace_discovery
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: levelup
    command: enrollment.create
    version: 1.0.0
    description: Enroll learner in cohort with optional escrow deposit.
    inputSchema:
      cohortId:
        type: string
        required: true
      depositCredits:
        type: number
        required: false
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      enrollmentId:
        type: string
      creditsDeposited:
        type: number
    dataAccess:
      - levelup_enrollments
      - levelup_enrollment_milestone_escrows
      - service_credits_wallets
      - service_credits_escrow_holds
    purpose: training_enrollment
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: levelup
    command: milestone.validate
    version: 1.0.0
    description: Record trainer/admin validation for milestone completion.
    inputSchema:
      enrollmentId:
        type: string
        required: true
      milestoneId:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      validationId:
        type: string
      status:
        type: string
    dataAccess:
      - levelup_milestone_validations
      - levelup_enrollments
      - levelup_rate_limit_counters
    purpose: milestone_assurance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: levelup
    command: milestone.release
    version: 1.0.0
    description: Release learner escrow to spendable credits and issue trainer split/completion bonus.
    inputSchema:
      enrollmentId:
        type: string
        required: true
      milestoneId:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      userTransferId:
        type: string
      trainerPayoutGovernanceId:
        type: string
      completionBonusGovernanceId:
        type: string
    dataAccess:
      - levelup_enrollment_milestone_escrows
      - levelup_milestone_validations
      - service_credits_escrow_holds
      - service_credits_governance_events
    purpose: milestone_settlement
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: levelup
    command: transfer.create
    version: 1.0.0
    description: Execute peer credit transfer inside LevelUp context.
    inputSchema:
      recipientUserId:
        type: string
        required: true
      amount:
        type: number
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      transferId:
        type: string
      status:
        type: string
    dataAccess:
      - service_credits_transfers
      - service_credits_wallets
    purpose: participant_value_transfer
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: levelup
    command: dispute.open
    version: 1.0.0
    description: Open milestone/enrollment dispute with comments and attachments.
    inputSchema:
      enrollmentId:
        type: string
        required: true
      milestoneId:
        type: string
        required: false
      title:
        type: string
        required: true
      description:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      disputeId:
        type: string
    dataAccess:
      - levelup_disputes
      - levelup_dispute_comments
      - levelup_milestone_validations
    purpose: dispute_intake
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: levelup
    command: dispute.resolve
    version: 1.0.0
    description: Resolve dispute with optional credit adjustment transfer.
    inputSchema:
      disputeId:
        type: string
        required: true
      resolutionComment:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      disputeId:
        type: string
      status:
        type: string
      transferId:
        type: string
    dataAccess:
      - levelup_disputes
      - levelup_dispute_comments
      - service_credits_dispute_adjustments
    purpose: dispute_resolution
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: levelup
    command: admin.adjust_credits
    version: 1.0.0
    description: Admin governance adjustment to learner or trainer balances.
    inputSchema:
      targetUserId:
        type: string
        required: true
      amount:
        type: number
        required: true
      reason:
        type: string
        required: true
      governanceTicketId:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      governanceEventId:
        type: string
      adjustmentId:
        type: string
    dataAccess:
      - service_credits_governance_events
      - service_credits_dispute_adjustments
      - service_credits_wallets
    purpose: governance_credit_control
    retentionClass: audit_long_lived
    idempotency: true
