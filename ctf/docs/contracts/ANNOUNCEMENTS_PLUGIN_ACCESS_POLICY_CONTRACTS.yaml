# DEPRECATED (2026-04-05): All announcement policies are now under the unified
# feed.* namespace in FEED_PLUGIN_ACCESS_POLICY_CONTRACTS.yaml.
# This file is retained for historical reference only.

policies:
  - pluginId: announcements
    command: announcements.draft.create
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      targetingValidation: required
    consentRequirements:
      scopes:
        - announcements_admin_authoring
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - invalid_targeting_constraints
      - cross_workspace_access

  - pluginId: announcements
    command: announcements.draft.update
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      draftStateRequired: true
      targetingValidation: required
    consentRequirements:
      scopes:
        - announcements_admin_authoring
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - announcement_not_draft
      - invalid_targeting_constraints

  - pluginId: announcements
    command: announcements.publish
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      directAdminPublishAllowed: true
    consentRequirements:
      scopes:
        - announcements_admin_publish
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - announcement_not_found
      - cross_workspace_access

  - pluginId: announcements
    command: announcements.read.mark
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnReadState: true
    consentRequirements:
      scopes:
        - announcements_consumption
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - cross_workspace_access

  - pluginId: announcements
    command: announcements.archive
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      directAdminArchiveAllowed: true
    consentRequirements:
      scopes:
        - announcements_admin_publish
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - announcement_not_found

  - pluginId: announcements
    command: announcements.dismiss
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnReadState: true
      mandatoryDismissGuard: required
    consentRequirements:
      scopes:
        - announcements_consumption
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - target_announcement_mandatory

  - pluginId: announcements
    command: announcements.targeting.validate
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      targetingValidation: required
    consentRequirements:
      scopes:
        - announcements_admin_authoring
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - invalid_targeting_constraints

  - pluginId: announcements
    command: announcements.membership.event.emit
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      eventPayloadValidation: required
      membershipProjectionAudit: required
    consentRequirements:
      scopes:
        - announcements_admin_publish
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - invalid_membership_event_payload
