policies:
  - pluginId: socketrelay
    command: socketrelay.request.create
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      requestOwnership: actor_is_owner
    consentRequirements:
      scopes:
        - socketrelay_request_management
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - invalid_request_payload

  - pluginId: socketrelay
    command: socketrelay.fulfillment.claim
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      requestMustBeClaimable: true
      actorCannotOwnRequest: true
    consentRequirements:
      scopes:
        - socketrelay_fulfillment_actions
      fallbackLawfulBasis: contract_preparation
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - request_not_claimable
      - actor_is_request_owner

  - pluginId: socketrelay
    command: socketrelay.fulfillment.message.send
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      participantMembershipRequired: true
      moderationGate: required
    consentRequirements:
      scopes:
        - socketrelay_fulfillment_communication
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - actor_not_fulfillment_participant
      - prohibited_content_detected
