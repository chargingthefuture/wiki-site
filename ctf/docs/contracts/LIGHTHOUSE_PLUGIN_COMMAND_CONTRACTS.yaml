contracts:
  - pluginId: lighthouse
    command: lighthouse.profile.upsert
    version: 1.0.0
    description: Create or update a seeker or host profile with role-bound validation.
    inputSchema:
      profileType:
        type: string
        required: true
      profile:
        type: object
        required: true
    outputSchema:
      profileId:
        type: string
      updatedAt:
        type: string
    dataAccess:
      - lighthouse_profiles
    purpose: profile_management
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: lighthouse
    command: lighthouse.match.request.create
    version: 1.0.0
    description: Create a match request from seeker to host property with duplicate safeguards.
    inputSchema:
      propertyId:
        type: string
        required: true
      message:
        type: string
        required: false
      desiredMoveInDate:
        type: string
        required: false
    outputSchema:
      matchId:
        type: string
      status:
        type: string
      createdAt:
        type: string
    dataAccess:
      - lighthouse_matches
      - lighthouse_properties
    purpose: housing_matching
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: lighthouse
    command: lighthouse.block.create
    version: 1.0.0
    description: Create a user safety block relation used by matching workflows.
    inputSchema:
      blockedUserId:
        type: string
        required: true
      reason:
        type: string
        required: false
    outputSchema:
      blockId:
        type: string
      createdAt:
        type: string
    dataAccess:
      - lighthouse_blocks
    purpose: user_safety_controls
    retentionClass: audit_long_lived
    idempotency: true
