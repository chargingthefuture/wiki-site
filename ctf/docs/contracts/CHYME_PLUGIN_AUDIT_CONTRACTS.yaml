auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: chyme
    command: chyme.room.state.fetch
    commandVersion: 1.0.0
    purpose: social_audio_presence
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        authenticationCheck: pass_or_fail
        approvalGateCheck: pass_or_fail
        tenancyCheck: pass_or_fail
    dataClassesAccessed:
      - chyme_room_metadata
      - service_profile_lifecycle_metadata
      - participant_roster_metadata
    targetContext:
      workspaceId: workspace_identifier
      roomId: room_identifier
      roomKey: room_key
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: chyme
    command: chyme.messages.list
    commandVersion: 1.0.0
    purpose: social_audio_chat_read
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        authenticationCheck: pass_or_fail
        approvalGateCheck: pass_or_fail
        readBoundsCheck: pass_or_fail
    dataClassesAccessed:
      - chyme_message_metadata
      - participant_membership_metadata
    targetContext:
      workspaceId: workspace_identifier
      roomKey: room_key
      limit: bounded_limit
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: chyme
    command: chyme.message.send
    commandVersion: 1.0.0
    purpose: social_audio_chat_write
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        authenticationCheck: pass_or_fail
        approvalGateCheck: pass_or_fail
        messageBoundsCheck: pass_or_fail
    dataClassesAccessed:
      - chyme_message_metadata
      - participant_membership_metadata
    targetContext:
      workspaceId: workspace_identifier
      roomKey: room_key
      messageId: message_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: chyme
    command: chyme.call.join
    commandVersion: 1.0.0
    purpose: social_audio_call_join
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        authenticationCheck: pass_or_fail
        approvalGateCheck: pass_or_fail
        streamConfigurationCheck: pass_or_fail
    dataClassesAccessed:
      - stream_channel_metadata
      - stream_user_token_metadata
    targetContext:
      workspaceId: workspace_identifier
      roomId: room_identifier
      streamChannelId: channel_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: chyme
    command: chyme.profile.delete.service
    commandVersion: 1.0.0
    purpose: service_scoped_deletion
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        authenticationCheck: pass_or_fail
        ownershipCheck: pass_or_fail
        deletionScopeCheck: pass_or_fail
    dataClassesAccessed:
      - service_profile_lifecycle_metadata
      - deletion_event_metadata
    targetContext:
      workspaceId: workspace_identifier
      userId: principal_identifier
      scope: service
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: chyme
    command: account.profile.delete.full
    commandVersion: 1.0.0
    purpose: account_scoped_deletion_request
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        authenticationCheck: pass_or_fail
        ownershipCheck: pass_or_fail
        deletionScopeCheck: pass_or_fail
        orchestratorDependencyLogged: pass_or_fail
    dataClassesAccessed:
      - deletion_event_metadata
      - orchestrator_queue_metadata
    targetContext:
      workspaceId: workspace_identifier
      userId: principal_identifier
      scope: account
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class
