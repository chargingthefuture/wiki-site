policies:
  - pluginId: unlock
    command: unlock.verification.submit
    version: 1.0.0
    requiredRoles:
      - member
      - contributor
      - moderator
      - admin
    attributePolicies:
      activeSessionRequired: true
      quoraProfileUrlPattern: strict
      submitterScopeOnly: true
    consentRequirements:
      scopes:
        - unlock_verification_submit
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - unauthenticated_session
      - invalid_quora_profile_url
      - unauthorized_scope

  - pluginId: unlock
    command: unlock.admin.submission.list
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      adminOnlyQueueAccess: required
    consentRequirements:
      scopes:
        - unlock_admin_read
      fallbackLawfulBasis: legitimate_interest
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role

  - pluginId: unlock
    command: unlock.admin.submission.review
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      adminOnlyModerationDecision: required
      reviewStatusTransitionRules: enforced
    consentRequirements:
      scopes:
        - unlock_admin_write
      fallbackLawfulBasis: legitimate_interest
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - invalid_status_transition
      - submission_not_found

  - pluginId: unlock
    command: unlock.incentive.approval.credit-grant
    version: 1.0.0
    requiredRoles:
      - admin
      - system
    attributePolicies:
      approvedSubmissionRequired: true
      oneTimeGrantPerUser: enforced
      idempotencyKeyRequired: true
    consentRequirements:
      scopes:
        - unlock_incentive_grant
      fallbackLawfulBasis: contract_performance
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - submission_not_approved
      - duplicate_grant_attempt
