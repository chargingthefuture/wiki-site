        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - actor_not_admin
      - cross_workspace_access

  # ─── Link Feedback to Task (Admin Only) ─────────────────────────────
  - pluginId: feedback
    command: feedback.linkToTask
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
