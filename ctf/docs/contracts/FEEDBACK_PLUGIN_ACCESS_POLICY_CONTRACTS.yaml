policies:
  # ─── Feedback Submission (Authenticated) ────────────────────────────
  - pluginId: feedback
    command: feedback.submit
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustBeAuthenticated: true
    consentRequirements:
      scopes:
        - feedback_submission
      fallbackLawfulBasis: legitimate_interest_product_feedback
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - cross_workspace_access

  # ─── Feedback Voting (Authenticated) ────────────────────────────────
  - pluginId: feedback
    command: feedback.vote
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustBeAuthenticated: true
      actorCannotVoteTwice: true
    consentRequirements:
      scopes:
        - feedback_consumption
      fallbackLawfulBasis: legitimate_interest_product_feedback
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - actor_already_voted

  # ─── Feedback Listing (Admin Only) ──────────────────────────────────
  - pluginId: feedback
    command: feedback.list
    version: 1.0.0
    requiredRoles:
      - adminctf/docs
    attributePolicies:
      tenancy: same_workspace
      actorMustBeAdmin: true
    consentRequirements:
      scopes:
        - feedback_administration
      fallbackLawfulBasis: legitimate_interest_product_management
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - actor_not_admin
      - cross_workspace_access

  # ─── Feedback Triage (Admin Only) ───────────────────────────────────
  - pluginId: feedback
    command: feedback.triage
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustBeAdmin: true
    consentRequirements:
      scopes:
        - feedback_administration
      fallbackLawfulBasis: legitimate_interest_product_management
    regionRestrictions:
