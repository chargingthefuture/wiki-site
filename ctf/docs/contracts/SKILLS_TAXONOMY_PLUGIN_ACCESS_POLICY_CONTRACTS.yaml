    version: 1.0.0
    requiredRoles:
      - admin
      - taxonomy_admin
    attributePolicies:
      tenancy: same_workspace
      taxonomyGovernanceMode: required
      orderingBoundsPolicy: enforced
    consentRequirements:
      scopes:
        - skills_taxonomy_admin
      fallbackLawfulBasis: legitimate_interest
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - invalid_taxonomy_payload

  - pluginId: skills-taxonomy
    command: skills-taxonomy.sector.update
