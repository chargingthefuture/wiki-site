policies:
  - pluginId: skills-taxonomy
    command: skills-taxonomy.hierarchy.get
    version: 1.0.0
    requiredRoles:
      - member
      - moderator
      - admin
      - service
    attributePolicies:
      tenancy: same_workspace
      taxonomyReadScope: approved_consumers_only
    consentRequirements:
      scopes: []
      fallbackLawfulBasis: contract_performance
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - cross_workspace_access
      - unauthorized_consumer_binding

  - pluginId: skills-taxonomy
    command: skills-taxonomy.flattened.get
    version: 1.0.0
    requiredRoles:
      - member
      - moderator
      - admin
