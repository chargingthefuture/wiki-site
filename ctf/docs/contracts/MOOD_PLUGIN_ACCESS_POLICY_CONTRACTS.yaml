policies:
  - pluginId: mood
    command: mood.check.submit
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      cooldownWindowDays: 7
      clientIdRequired: true
    consentRequirements:
      scopes:
        - mood_check_tracking
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - invalid_mood_value
      - cooldown_not_elapsed

  - pluginId: mood
    command: mood.check.eligibility.fetch
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      clientIdRequired: true
    consentRequirements:
      scopes:
        - mood_check_tracking
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - missing_client_id
