auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: unlock
    command: unlock.verification.submit
    commandVersion: 1.0.0
    purpose: identity_signal_submission
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - unlock_verification_submissions
    targetContext:
      userId: user_identifier
      submissionId: submission_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: unlock
    command: unlock.admin.submission.list
    commandVersion: 1.0.0
    purpose: moderation_queue
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - unlock_verification_submissions
    targetContext:
      adminUserId: user_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: unlock
    command: unlock.admin.submission.review
    commandVersion: 1.0.0
    purpose: moderation_and_unlock_transition
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - unlock_verification_submissions
      - unlock_audit_log
    targetContext:
      adminUserId: user_identifier
      submissionId: submission_identifier
      targetUserId: user_identifier
      reviewStatus: review_status
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: unlock
    command: unlock.incentive.approval.credit-grant
    commandVersion: 1.0.0
    purpose: incentive_award
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - unlock_verification_submissions
      - service_credits_governance_events
      - service_credits_ledger_entries
    targetContext:
      targetUserId: user_identifier
      submissionId: submission_identifier
      governanceEventId: governance_event_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class
