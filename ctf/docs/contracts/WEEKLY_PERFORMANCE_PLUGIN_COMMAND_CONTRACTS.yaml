contracts:
  - pluginId: weekly-performance
    command: weekly-performance.week.list
    version: 1.0.0
    description: List available weekly windows for authorized operator review flows.
    inputSchema:
      page:
        type: integer
        required: false
      pageSize:
        type: integer
        required: false
    outputSchema:
      items:
        type: array
      nextCursor:
        type: string
    dataAccess:
      - weekly_performance_week_windows
      - weekly_performance_metric_snapshots
    purpose: operational_metrics_review
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: weekly-performance
    command: weekly-performance.week.get
    version: 1.0.0
    description: Retrieve canonical metadata and status for a selected weekly window.
    inputSchema:
      weekStart:
        type: string
        required: true
    outputSchema:
      weekStart:
        type: string
      weekEnd:
        type: string
      isCurrentWeek:
        type: boolean
    dataAccess:
      - weekly_performance_week_windows
    purpose: operational_metrics_review
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: weekly-performance
    command: weekly-performance.metrics.get
    version: 1.0.0
    description: Read deterministic weekly metrics snapshot for approved growth, revenue, and engagement fields.
    inputSchema:
      weekStart:
        type: string
        required: true
      metricSetVersion:
        type: string
        required: false
    outputSchema:
      weekStart:
        type: string
      metrics:
        type: object
      generatedAt:
        type: string
    dataAccess:
      - weekly_performance_metric_snapshots
      - canonical_metrics_registry
    purpose: operational_metrics_review
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: weekly-performance
    command: weekly-performance.comparison.get
    version: 1.0.0
    description: Compute and return week-over-week comparison values for approved canonical metrics.
    inputSchema:
      weekStart:
        type: string
        required: true
      baselineWeekStart:
        type: string
        required: false
      metricSetVersion:
        type: string
        required: false
    outputSchema:
      weekStart:
        type: string
      baselineWeekStart:
        type: string
      comparisons:
        type: array
    dataAccess:
      - weekly_performance_metric_snapshots
      - canonical_metrics_registry
    purpose: operational_metrics_comparison
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: weekly-performance
    command: weekly-performance.report.export
    version: 1.0.0
    description: Export an approved weekly performance report artifact for authorized operator workflows.
    inputSchema:
      weekStart:
        type: string
        required: true
      format:
        type: string
        required: true
      includeComparison:
        type: boolean
        required: false
    outputSchema:
      exportId:
        type: string
      status:
        type: string
      artifactUrl:
        type: string
      expiresAt:
        type: string
    dataAccess:
      - weekly_performance_metric_snapshots
      - weekly_performance_exports
      - weekly_performance_audit_log
    purpose: operational_metrics_export
    retentionClass: audit_long_lived
    idempotency: false

changelog:
  - date: 2026-02-25
    change: Initial Weekly Performance command contract skeleton added for week listing, snapshot retrieval, comparison, and export workflows.
