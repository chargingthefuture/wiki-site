auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: service-credits
    command: wallet.create
    commandVersion: 1.0.0
    purpose: wallet_lifecycle
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - canonical_profile_reference
      - wallet_identity_binding
    targetContext:
      workspaceId: workspace_identifier
      walletId: wallet_identifier
      userId: user_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

