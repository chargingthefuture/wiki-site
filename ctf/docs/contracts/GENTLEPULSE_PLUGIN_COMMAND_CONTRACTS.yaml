contracts:
  - pluginId: gentlepulse
    command: gentlepulse.library.list
    version: 1.0.0
    description: List meditations with sort/filter and favorites-only options.
    inputSchema:
      sort:
        type: string
        required: false
      tags:
        type: array
        required: false
      favoritesOnly:
        type: boolean
        required: false
      limit:
        type: integer
        required: false
      offset:
        type: integer
        required: false
    outputSchema:
      items:
        type: array
      total:
        type: integer
    dataAccess:
      - gentlepulse_meditations
      - gentlepulse_favorites
      - gentlepulse_ratings
    purpose: wellbeing_content_discovery
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: gentlepulse
    command: gentlepulse.meditation.play.record
    version: 1.0.0
    description: Record a meditation play event and return launch metadata.
    inputSchema:
      meditationId:
        type: string
        required: true
    outputSchema:
      meditationId:
        type: string
      playCount:
        type: integer
      mediaUrl:
        type: string
    dataAccess:
      - gentlepulse_meditation_play_events
      - gentlepulse_meditations
    purpose: wellbeing_engagement_tracking
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: gentlepulse
    command: gentlepulse.rating.upsert
    version: 1.0.0
    description: Create or update authenticated user rating for a meditation.
    inputSchema:
      meditationId:
        type: string
        required: true
      rating:
        type: integer
        required: true
    outputSchema:
      meditationId:
        type: string
      averageRating:
        type: number
      ratingCount:
        type: integer
    dataAccess:
      - gentlepulse_ratings
      - gentlepulse_rating_aggregates
    purpose: wellbeing_feedback
    retentionClass: transactional_long_lived
    idempotency: true
