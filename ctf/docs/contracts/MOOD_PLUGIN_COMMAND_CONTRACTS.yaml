contracts:
  - pluginId: mood
    command: mood.check.submit
    version: 1.0.0
    description: Submit a mood check with value constraints and timestamp capture.
    inputSchema:
      clientId:
        type: string
        required: true
      moodValue:
        type: integer
        required: true
    outputSchema:
      checkId:
        type: string
      submittedAt:
        type: string
    dataAccess:
      - mood_checks
    purpose: wellbeing_checkin_tracking
    retentionClass: transactional_long_lived
    idempotency: false

  - pluginId: mood
    command: mood.check.eligibility.fetch
    version: 1.0.0
    description: Retrieve whether a client is eligible for a new mood check based on cooldown policy.
    inputSchema:
      clientId:
        type: string
        required: true
    outputSchema:
      eligible:
        type: boolean
      nextEligibleAt:
        type: string
    dataAccess:
      - mood_checks
    purpose: wellbeing_checkin_eligibility
    retentionClass: derived_short_lived
    idempotency: true
