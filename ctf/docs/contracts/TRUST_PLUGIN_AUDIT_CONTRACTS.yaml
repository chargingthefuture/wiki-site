auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: trust
    command: trust.summary.read
    commandVersion: 1.0.0
    purpose: trust_signal_display
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - trust_public_summary_metadata
    targetContext:
      viewerUserId: user_identifier
      subjectUserId: user_identifier
      surface: surface_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: trust
    command: trust.visibility.update
    commandVersion: 1.0.0
    purpose: privacy_safety_preference_update
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - trust_visibility_metadata
      - trust_user_extension
    targetContext:
      subjectUserId: user_identifier
      trustVisibilityLevel: visibility_level
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: trust
    command: trust.admin.verification.review
    commandVersion: 1.0.0
    purpose: trust_verification_moderation
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - trust_verification_metadata
      - trust_user_extension
      - trust_admin_audit_trail
    targetContext:
      reviewerUserId: user_identifier
      subjectUserId: user_identifier
      verificationStatus: verification_status
      internalReasonCode: moderation_reason_code
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: trust
    command: trust.signal.snapshot.refresh
    commandVersion: 1.0.0
    purpose: trust_signal_aggregation
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - trust_snapshot_metadata
      - plugin_activity_bucket_metadata
    targetContext:
      subjectUserId: user_identifier
      sourcePlugins: approved_plugin_list
      snapshotGeneratedAt: timestamp_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class