contracts:
  - pluginId: chyme
    command: chyme.room.state.fetch
    version: 1.0.0
    description: Fetch Chyme room state and upsert caller as active participant profile/member.
    inputSchema:
      roomKey:
        type: string
        required: false
        default: chyme-main-room
    outputSchema:
      roomId:
        type: string
      roomName:
        type: string
      roomKey:
        type: string
      callActive:
        type: boolean
      participants:
        type: array
    dataAccess:
      - chyme_rooms
      - chyme_service_profiles
      - chyme_room_members
    purpose: social_audio_presence
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: chyme
    command: chyme.messages.list
    version: 1.0.0
    description: Read bounded Chyme message history for the deterministic room.
    inputSchema:
      limit:
        type: number
        required: false
        minimum: 1
        maximum: 100
    outputSchema:
      roomKey:
        type: string
      messages:
        type: array
    dataAccess:
      - chyme_rooms
      - chyme_service_profiles
      - chyme_room_members
      - chyme_messages
    purpose: social_audio_chat_read
    retentionClass: communication_medium_lived
    idempotency: true

  - pluginId: chyme
    command: chyme.message.send
    version: 1.0.0
    description: Send a trimmed Chyme chat message after policy and size validation.
    inputSchema:
      text:
        type: string
        required: true
        minLength: 1
        maxLength: 1000
    outputSchema:
      ok:
        type: boolean
      message:
        type: object
    dataAccess:
      - chyme_rooms
      - chyme_service_profiles
      - chyme_room_members
      - chyme_messages
    purpose: social_audio_chat_write
    retentionClass: communication_medium_lived
    idempotency: false

  - pluginId: chyme
    command: chyme.call.join
    version: 1.0.0
    description: Provision Stream token and channel membership for Chyme room join flow.
    inputSchema: {}
    outputSchema:
      ok:
        type: boolean
      roomId:
        type: string
      roomKey:
        type: string
      streamApiKey:
        type: string
      streamChannelId:
        type: string
      streamUserId:
        type: string
      streamToken:
        type: string
    dataAccess:
      - chyme_rooms
      - chyme_service_profiles
      - chyme_room_members
      - stream_channel_metadata
      - stream_user_token_metadata
    purpose: social_audio_call_join
    retentionClass: operational_medium_lived
    idempotency: true

  - pluginId: chyme
    command: chyme.profile.delete.service
    version: 1.0.0
    description: Execute service-scoped Chyme deletion and record compliance event.
    inputSchema: {}
    outputSchema:
      ok:
        type: boolean
      scope:
        type: string
      status:
        type: string
      requestedAtIso:
        type: string
    dataAccess:
      - chyme_service_profiles
      - chyme_room_members
      - chyme_messages
      - chyme_deletion_events
    purpose: service_scoped_deletion
    retentionClass: compliance_long_lived
    idempotency: true

  - pluginId: chyme
    command: account.profile.delete.full
    version: 1.0.0
    description: Record full-account deletion request for global orchestrator processing.
    inputSchema: {}
    outputSchema:
      ok:
        type: boolean
      scope:
        type: string
      status:
        type: string
      requestedAtIso:
        type: string
    dataAccess:
      - chyme_deletion_events
      - service_credits_reclaim_dependency
    purpose: account_scoped_deletion_request
    retentionClass: compliance_long_lived
    idempotency: true
