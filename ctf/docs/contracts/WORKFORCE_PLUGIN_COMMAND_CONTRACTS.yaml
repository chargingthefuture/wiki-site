contracts:
  - pluginId: workforce
    command: workforce.dashboard.fetch
    version: 1.0.0
    description: Fetch workforce dashboard metrics and current-state summaries.
    inputSchema:
      scope:
        type: object
        required: false
    outputSchema:
      summary:
        type: object
      generatedAt:
        type: string
    dataAccess:
      - workforce_report_snapshots
      - canonical_metrics_registry
    purpose: workforce_visibility
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.profile.fetch
    version: 1.0.0
    description: Fetch caller workforce profile extension.
    inputSchema:
      userScope:
        type: self
        required: true
    outputSchema:
      profile:
        type: object
    dataAccess:
      - workforce_profiles
      - workforce_user_extension
    purpose: workforce_profile_management
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.profile.update
    version: 1.0.0
    description: Update workforce extension profile fields permitted by policy.
    inputSchema:
      profile:
        type: object
        required: true
    outputSchema:
      profileId:
        type: string
      updatedAt:
        type: string
    dataAccess:
      - workforce_profiles
      - workforce_admin_audit_trail
    purpose: workforce_profile_management
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.profile.delete
    version: 1.0.0
    description: Service-scoped workforce profile deletion and extension reset.
    inputSchema:
      scope:
        type: string
        enum: [service]
    outputSchema:
      status:
        type: string
      requestedAtIso:
        type: string
    dataAccess:
      - workforce_profiles
      - workforce_user_extension
      - workforce_recruited_events
    purpose: workforce_profile_management
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.occupations.list
    version: 1.0.0
    description: List workforce occupations.
    inputSchema:
      pagination:
        type: object
    outputSchema:
      items:
        type: array
      pagination:
        type: object
    dataAccess:
      - workforce_occupations
    purpose: workforce_catalog
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.occupations.detail.fetch
    version: 1.0.0
    description: Fetch workforce occupation details.
    inputSchema:
      occupationId:
        type: string
        required: true
    outputSchema:
      occupation:
        type: object
    dataAccess:
      - workforce_occupations
    purpose: workforce_catalog
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.occupations.admin.create
    version: 1.0.0
    description: Create workforce occupation entry.
    inputSchema:
      occupation:
        type: object
        required: true
    outputSchema:
      occupation:
        type: object
    dataAccess:
      - workforce_occupations
      - workforce_admin_audit_trail
    purpose: workforce_admin_operations
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.occupations.admin.update
    version: 1.0.0
    description: Update workforce occupation entry.
    inputSchema:
      occupationId:
        type: string
      occupation:
        type: object
    outputSchema:
      occupation:
        type: object
    dataAccess:
      - workforce_occupations
      - workforce_admin_audit_trail
    purpose: workforce_admin_operations
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.occupations.admin.delete
    version: 1.0.0
    description: Delete workforce occupation entry.
    inputSchema:
      occupationId:
        type: string
    outputSchema:
      status:
        type: string
    dataAccess:
      - workforce_occupations
      - workforce_admin_audit_trail
    purpose: workforce_admin_operations
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.announcements.list
    version: 1.0.0
    description: List active workforce announcements.
    inputSchema:
      visibility:
        type: string
        enum: [public]
    outputSchema:
      announcements:
        type: array
    dataAccess:
      - workforce_announcements
    purpose: workforce_visibility
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.announcements.admin.list
    version: 1.0.0
    description: List workforce announcements including inactive entries.
    inputSchema:
      includeInactive:
        type: boolean
    outputSchema:
      announcements:
        type: array
    dataAccess:
      - workforce_announcements
      - workforce_admin_audit_trail
    purpose: workforce_admin_operations
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.announcements.admin.create
    version: 1.0.0
    description: Create workforce announcement.
    inputSchema:
      announcement:
        type: object
    outputSchema:
      announcement:
        type: object
    dataAccess:
      - workforce_announcements
      - workforce_admin_audit_trail
    purpose: workforce_admin_operations
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.announcements.admin.update
    version: 1.0.0
    description: Update workforce announcement.
    inputSchema:
      announcementId:
        type: string
      announcement:
        type: object
    outputSchema:
      announcement:
        type: object
    dataAccess:
      - workforce_announcements
      - workforce_admin_audit_trail
    purpose: workforce_admin_operations
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.announcements.admin.deactivate
    version: 1.0.0
    description: Deactivate workforce announcement.
    inputSchema:
      announcementId:
        type: string
    outputSchema:
      status:
        type: string
    dataAccess:
      - workforce_announcements
      - workforce_admin_audit_trail
    purpose: workforce_admin_operations
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.report.summary.fetch
    version: 1.0.0
    description: Fetch workforce summary report.
    inputSchema:
      scope:
        type: object
    outputSchema:
      summary:
        type: object
    dataAccess:
      - workforce_profiles
      - canonical_metrics_registry
    purpose: workforce_reporting
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.report.skillLevel.fetch
    version: 1.0.0
    description: Fetch workforce grouped report by skill level.
    inputSchema:
      skillLevel:
        type: string
        required: false
    outputSchema:
      items:
        type: array
    dataAccess:
      - workforce_profiles
      - canonical_metrics_registry
    purpose: workforce_reporting
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.report.sector.fetch
    version: 1.0.0
    description: Fetch workforce grouped report by sector.
    inputSchema:
      sector:
        type: string
        required: false
    outputSchema:
      items:
        type: array
    dataAccess:
      - workforce_profiles
      - workforce_occupations
      - canonical_metrics_registry
    purpose: workforce_reporting
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.export.job.create
    version: 1.0.0
    description: Record deferred export job request (execution deferred in phase-1).
    inputSchema:
      exportType:
        type: string
        required: true
      filters:
        type: object
        required: false
    outputSchema:
      jobId:
        type: string
      status:
        type: string
    dataAccess:
      - workforce_report_snapshots
      - workforce_export_jobs
    purpose: workforce_reporting_exports
    retentionClass: operational_medium_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.export.job.status.fetch
    version: 1.0.0
    description: Fetch deferred export job status.
    inputSchema:
      jobId:
        type: string
    outputSchema:
      job:
        type: object
    dataAccess:
      - workforce_export_jobs
    purpose: workforce_reporting_exports
    retentionClass: operational_medium_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.export.job.result.fetch
    version: 1.0.0
    description: Fetch deferred export job result metadata.
    inputSchema:
      jobId:
        type: string
    outputSchema:
      result:
        type: object
    dataAccess:
      - workforce_export_jobs
    purpose: workforce_reporting_exports
    retentionClass: operational_medium_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.admin.config.fetch
    version: 1.0.0
    description: Fetch workforce admin configuration.
    inputSchema:
      scope:
        type: object
    outputSchema:
      config:
        type: object
    dataAccess:
      - workforce_config
    purpose: workforce_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.admin.config.update
    version: 1.0.0
    description: Update workforce planning configuration and policy flags.
    inputSchema:
      config:
        type: object
        required: true
    outputSchema:
      configVersion:
        type: string
      updatedAt:
        type: string
    dataAccess:
      - workforce_config
      - workforce_admin_audit_trail
    purpose: workforce_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.admin.recompute.enqueue
    version: 1.0.0
    description: Enqueue recruited-state recompute derived from Directory profile writes.
    inputSchema:
      source:
        type: string
        enum: [directory_profiles]
    outputSchema:
      insertedEvents:
        type: integer
    dataAccess:
      - directory_profiles
      - workforce_recruited_events
      - workforce_profiles
      - workforce_admin_audit_trail
    purpose: workforce_recruited_derivation
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.admin.auditEvents.fetch
    version: 1.0.0
    description: Fetch workforce admin audit trail.
    inputSchema:
      pagination:
        type: object
    outputSchema:
      items:
        type: array
      pagination:
        type: object
    dataAccess:
      - workforce_admin_audit_trail
    purpose: workforce_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: workforce
    command: workforce.metric.recruited.derive
    version: 1.0.0
    description: Derive recruited metric state from directory source events with deterministic dedupe keys.
    inputSchema:
      sourceEvent:
        type: string
    outputSchema:
      dedupeKey:
        type: string
      resolvedRecruited:
        type: boolean
    dataAccess:
      - workforce_recruited_events
      - workforce_profiles
      - canonical_metrics_registry
    purpose: workforce_recruited_derivation
    retentionClass: audit_long_lived
    idempotency: true
