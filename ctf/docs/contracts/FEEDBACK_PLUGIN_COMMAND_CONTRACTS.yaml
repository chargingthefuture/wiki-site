contracts:
  # ─── Feedback Submission ────────────────────────────────────────────
  - pluginId: feedback
    command: feedback.submit
    version: 1.0.0
    description: User submits feedback (bug report, feature request, general, or satisfaction) to the system.
    inputSchema:
      type:
        type: string
        enum: [bug_report, feature_request, general, satisfaction]
        required: true
      title:
        type: string
        required: true
      body:
        type: string
        required: false
      category:
        type: string
        required: false
        description: Plugin name or area (e.g., feed, trust, directory)
      metadata:
        type: object
        required: false
        description: Device info, app version, screenshot URLs, etc.
    outputSchema:
      feedbackId:
        type: string
        format: uuid
      status:
        type: string
      submittedAt:
        type: string
    dataAccess:
      - feedback_items
      - feedback_audit
    purpose: feedback_collection
    retentionClass: derived_long_lived
    idempotency: true

  # ─── Feedback Voting ────────────────────────────────────────────────
  - pluginId: feedback
    command: feedback.vote
    version: 1.0.0
    description: User upvotes a feedback item (one vote per user per item).
    inputSchema:
      feedbackId:
        type: string
        format: uuid
        required: true
    outputSchema:
      feedbackId:
        type: string
      voteCount:
        type: integer
      userVoted:
        type: boolean
      votedAt:
        type: string
    dataAccess:
      - feedback_votes
      - feedback_items
      - feedback_audit
    purpose: feedback_aggregation
    retentionClass: transactional_long_lived
    idempotency: true

  # ─── Feedback Listing (Admin) ───────────────────────────────────────
  - pluginId: feedback
    command: feedback.list
    version: 1.0.0
    description: List and filter feedback items (admin only).
    inputSchema:
      status:
        type: string
        enum: [new, triaged, matched_to_inventory, approval_pending, approved, linked_to_task, resolved, dismissed]
        required: false
      type:
        type: string
        enum: [bug_report, feature_request, general, satisfaction]
        required: false
      category:
        type: string
        required: false
      priority:
        type: string
        enum: [critical, high, medium, low]
        required: false
      page:
        type: integer
        required: false
      pageSize:
        type: integer
        required: false
    outputSchema:
      items:
        type: array
      pagination:
        type: object
      totalCount:
        type: integer
    dataAccess:
      - feedback_items
      - feedback_votes
    purpose: feedback_discovery
    retentionClass: derived_short_lived
    idempotency: true

  # ─── Feedback Triage (Admin) ────────────────────────────────────────
  - pluginId: feedback
    command: feedback.triage
    version: 1.0.0
    description: Set priority, category, and status for a feedback item (admin only).
    inputSchema:
      feedbackId:
        type: string
        format: uuid
        required: true
      priority:
        type: string
        enum: [critical, high, medium, low]
        required: false
      category:
        type: string
        required: false
      status:
        type: string
        enum: [triaged, linked, resolved, dismissed]
        required: false
    outputSchema:
      feedbackId:
        type: string
      priority:
        type: string
      category:
        type: string
      status:
        type: string
      triageAt:
        type: string
    dataAccess:
      - feedback_items
      - feedback_audit
    purpose: feedback_management
    retentionClass: transactional_long_lived
    idempotency: true

  # ─── Link Feedback to Task (Admin) ──────────────────────────────────
  - pluginId: feedback
    command: feedback.linkToTask
    version: 1.0.0
    description: Link feedback item to a PM task (sets status to 'linked').
    inputSchema:
      feedbackId:
        type: string
        format: uuid
        required: true
      taskId:
        type: string
        format: uuid
        required: true
    outputSchema:
      feedbackId:
        type: string
      taskId:
        type: string
      status:
        type: string
      linkedAt:
        type: string
    dataAccess:
      - feedback_items
      - feedback_audit
    purpose: feedback_to_task_linking
    retentionClass: transactional_long_lived
    idempotency: true

  # ─── Resolve Feedback (Admin) ───────────────────────────────────────
  - pluginId: feedback
    command: feedback.resolve
    version: 1.0.0
    description: Mark feedback as resolved with optional resolution note.
    inputSchema:
      feedbackId:
        type: string
        format: uuid
        required: true
      resolutionNote:
        type: string
        required: false
    outputSchema:
      feedbackId:
        type: string
      status:
        type: string
      resolvedAt:
        type: string
    dataAccess:
      - feedback_items
      - feedback_audit
    purpose: feedback_resolution
    retentionClass: transactional_long_lived
    idempotency: true

  # ─── Get Feedback Details ───────────────────────────────────────────
  - pluginId: feedback
    command: feedback.get
    version: 1.0.0
    description: Fetch detailed feedback item with vote count and full history.
    inputSchema:
      feedbackId:
        type: string
        format: uuid
        required: true
    outputSchema:
      feedbackId:
        type: string
      title:
        type: string
      body:
        type: string
      type:
        type: string
      category:
        type: string
      priority:
        type: string
      status:
        type: string
      voteCount:
        type: integer
      submittedBy:
        type: string
      createdAt:
        type: string
      updatedAt:
        type: string
      metadata:
        type: object
    dataAccess:
      - feedback_items
      - feedback_votes
    purpose: feedback_discovery
    retentionClass: derived_short_lived
    idempotency: true

  # ─── MVP Workflow: Create Inventory Match ──────────────────────────
  - pluginId: feedback
    command: feedback.createInventoryMatch
    version: 1.0.0
    description: AI matcher creates match record linking feedback to inventory (called by matcher agent).
    inputSchema:
      feedbackId:
        type: string
        format: uuid
        required: true
      inventoryFilePath:
        type: string
        required: true
        description: e.g. ctf-feed-feature-inventory.md
      matchConfidence:
        type: number
        required: true
        description: 0-1 confidence score
      suggestedUpdates:
        type: object
        required: true
        description: Schema changes, API changes, command additions
      matcherReasoning:
        type: string
        required: false
    outputSchema:
      matchId:
        type: string
        format: uuid
      feedbackId:
        type: string
      inventoryFilePath:
        type: string
      matchConfidence:
        type: number
      createdAt:
        type: string
    dataAccess:
      - feedback_inventory_matches
      - feedback_items
      - feedback_audit
    purpose: feedback_matching
    retentionClass: transactional_long_lived
    idempotency: true

  # ─── MVP Workflow: Get Approval Queue ──────────────────────────────
  - pluginId: feedback
    command: feedback.getApprovalQueue
    version: 1.0.0
    description: Fetch pending approvals awaiting human review (admin only).
    inputSchema:
      status:
        type: string
        enum: [pending, approved, rejected, modified]
        required: false
      page:
        type: integer
        required: false
      pageSize:
        type: integer
        required: false
    outputSchema:
      items:
        type: array
        description: Approval queue entries with feedback + match context
      pagination:
        type: object
      totalCount:
        type: integer
    dataAccess:
      - approval_queue
      - feedback_items
      - feedback_inventory_matches
    purpose: approval_workflow
    retentionClass: derived_short_lived
    idempotency: true

  # ─── MVP Workflow: Approve Match ────────────────────────────────────
  - pluginId: feedback
    command: feedback.approveMatch
    version: 1.0.0
    description: Admin approves inventory match and proposed artifact changes.
    inputSchema:
      approvalId:
        type: string
        format: uuid
        required: true
      approverFeedback:
        type: string
        required: false
      approvedArtifactChanges:
        type: object
        required: false
        description: If different from suggested, admin-modified changes
    outputSchema:
      approvalId:
        type: string
      status:
        type: string
        enum: [approved]
      approvedAt:
        type: string
    dataAccess:
      - approval_queue
      - feedback_items
      - implementation_queue
      - feedback_audit
    purpose: approval_workflow
    retentionClass: transactional_long_lived
    idempotency: true

  # ─── MVP Workflow: Reject Match ─────────────────────────────────────
  - pluginId: feedback
    command: feedback.rejectMatch
    version: 1.0.0
    description: Admin rejects inventory match proposal.
    inputSchema:
      approvalId:
        type: string
        format: uuid
        required: true
      rejectionReason:
        type: string
        required: true
    outputSchema:
      approvalId:
        type: string
      status:
        type: string
        enum: [rejected]
      feedbackStatus:
        type: string
        enum: [dismissed]
    dataAccess:
      - approval_queue
      - feedback_items
      - feedback_audit
    purpose: approval_workflow
    retentionClass: transactional_long_lived
    idempotency: true

  # ─── MVP Workflow: Get Implementation Queue ────────────────────────
  - pluginId: feedback
    command: feedback.getImplementationQueue
    version: 1.0.0
    description: Fetch pending implementations awaiting code agent execution.
    inputSchema:
      status:
        type: string
        enum: [pending, in_progress, completed, failed]
        required: false
      page:
        type: integer
        required: false
      pageSize:
        type: integer
        required: false
    outputSchema:
      items:
        type: array
        description: Implementation queue entries
      pagination:
        type: object
      totalCount:
        type: integer
    dataAccess:
      - implementation_queue
      - feedback_items
      - approval_queue
    purpose: implementation_workflow
    retentionClass: derived_short_lived
    idempotency: true

  # ─── MVP Workflow: Set Implementation Status ────────────────────────
  - pluginId: feedback
    command: feedback.setImplementationStatus
    version: 1.0.0
    description: Implementation agent updates implementation queue status with logs.
    inputSchema:
      implementationId:
        type: string
        format: uuid
        required: true
      status:
        type: string
        enum: [in_progress, completed, failed]
        required: true
      implementationAgentId:
        type: string
        required: false
      implementationLog:
        type: string
        required: false
    outputSchema:
      implementationId:
        type: string
      status:
        type: string
      feedbackStatus:
        type: string
        description: Will be updated to 'resolved' if status='completed'
      completedAt:
        type: string
    dataAccess:
      - implementation_queue
      - feedback_items
      - feedback_audit
    purpose: implementation_workflow
    retentionClass: transactional_long_lived
    idempotency: true
