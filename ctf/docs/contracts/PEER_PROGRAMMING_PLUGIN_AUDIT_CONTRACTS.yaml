auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: peer-programming
    command: cohort.weekly.select
    commandVersion: 1.0.0
    purpose: cohort_assignment
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - canonical_user_profile_reference
      - login_activity_window
      - cohort_membership_plan
    targetContext:
      workspaceId: workspace_identifier
      weekKey: week_identifier
      selectionRunId: selection_run_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

