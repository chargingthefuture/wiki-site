contracts:
  - pluginId: trusttransport
    command: trusttransport.request.create
    version: 1.0.0
    description: Create a trusttransport request for ride, package, or food mode.
    inputSchema:
      mode:
        type: string
        required: true
      requestPayload:
        type: object
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      requestId:
        type: string
      status:
        type: string
      createdAt:
        type: string
    dataAccess:
      - trusttransport_requests
      - trusttransport_status_events
    purpose: marketplace_request_creation
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: trusttransport
    command: trusttransport.offer.accept
    version: 1.0.0
    description: Accept an offer and initialize trip/order execution lifecycle.
    inputSchema:
      offerId:
        type: string
        required: true
      idempotencyKey:
        type: string
        required: true
    outputSchema:
      tripId:
        type: string
      status:
        type: string
    dataAccess:
      - trusttransport_offers
      - trusttransport_trips
      - trusttransport_status_events
    purpose: marketplace_fulfillment_start
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: trusttransport
    command: trusttransport.trip.status.update
    version: 1.0.0
    description: Apply canonical status transition for active trip or delivery lifecycle.
    inputSchema:
      tripId:
        type: string
        required: true
      nextStatus:
        type: string
        required: true
      proof:
        type: object
        required: false
    outputSchema:
      tripId:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    dataAccess:
      - trusttransport_trips
      - trusttransport_status_events
      - trusttransport_proof_artifacts
    purpose: lifecycle_transition
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: trusttransport
    command: trusttransport.payout.request
    version: 1.0.0
    description: Submit payout request from earnings ledger balance.
    inputSchema:
      providerId:
        type: string
        required: true
      amount:
        type: number
        required: true
    outputSchema:
      payoutRequestId:
        type: string
      status:
        type: string
    dataAccess:
      - trusttransport_earnings_ledger
      - trusttransport_payout_requests
    purpose: provider_payouts
    retentionClass: financial_long_lived
    idempotency: true
