policies:
  - pluginId: levelup
    command: cohort.create
    version: 1.0.0
    requiredRoles:
      - admin
      - trainer
    attributePolicies:
      tenancy: same_workspace
      profileStatus: approved_user_or_admin
    consentRequirements:
      scopes:
        - levelup_manage_cohorts
      fallbackLawfulBasis: contract_performance
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - profile_not_approved

  - pluginId: levelup
    command: cohort.list
    version: 1.0.0
    requiredRoles:
      - member
      - trainer
      - admin
    attributePolicies:
      tenancy: same_workspace
    consentRequirements:
      scopes:
        - levelup_read
      fallbackLawfulBasis: contract_performance
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - profile_not_approved

  - pluginId: levelup
    command: enrollment.create
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      enrollmentRateLimit: enforced
      cohortStatusAllowed:
        - open
        - active
    consentRequirements:
      scopes:
        - levelup_enroll
      fallbackLawfulBasis: contract_performance
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_balance
      - rate_limit_exceeded
      - cohort_closed

  - pluginId: levelup
    command: milestone.validate
    version: 1.0.0
    requiredRoles:
      - trainer
      - admin
    attributePolicies:
      tenancy: same_workspace
      trainerAssignmentOrAdmin: true
      validationRateLimit: enforced
    consentRequirements:
      scopes:
        - levelup_validate_milestones
      fallbackLawfulBasis: legitimate_interest
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - trainer_not_assigned
      - rate_limit_exceeded

  - pluginId: levelup
    command: milestone.release
    version: 1.0.0
    requiredRoles:
      - trainer
      - admin
    attributePolicies:
      tenancy: same_workspace
      trainerAssignmentOrAdmin: true
      milestoneMustBeValidated: true
    consentRequirements:
      scopes:
        - levelup_release_credits
      fallbackLawfulBasis: contract_performance
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - milestone_not_validated
      - escrow_missing
      - invalid_release_state

  - pluginId: levelup
    command: dispute.open
    version: 1.0.0
    requiredRoles:
      - member
      - trainer
      - admin
    attributePolicies:
      tenancy: same_workspace
      disputeWindowOpen: true
    consentRequirements:
      scopes:
        - levelup_dispute
      fallbackLawfulBasis: legal_obligation
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - dispute_window_closed
      - enrollment_not_visible

  - pluginId: levelup
    command: dispute.resolve
    version: 1.0.0
    requiredRoles:
      - admin
      - trainer
    attributePolicies:
      tenancy: same_workspace
      trainerAssignmentOrAdmin: true
    consentRequirements:
      scopes:
        - levelup_dispute_resolve
      fallbackLawfulBasis: legal_obligation
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - dispute_not_open

  - pluginId: levelup
    command: admin.adjust_credits
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      governanceTicketRequired: true
    consentRequirements:
      scopes:
        - levelup_admin_credit_adjust
      fallbackLawfulBasis: legal_obligation
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - governance_ticket_missing
