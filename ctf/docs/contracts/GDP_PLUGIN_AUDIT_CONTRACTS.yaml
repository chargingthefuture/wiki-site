auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: gross-domestic-product
    command: metrics.list
    commandVersion: 1.0.0
    purpose: transparency_reporting
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
    dataClassesAccessed:
      - aggregate_metric_values
      - metric_metadata
    targetContext:
      workspaceId: workspace_identifier
      snapshotVersion: snapshot_version_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

