policies:
  - pluginId: foundation
    command: foundation.search.providers
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      directoryDataAccess: read_only_projection
      providerVisibility: policy_allowed
    consentRequirements:
      scopes:
        - connection_matchmaking
      fallbackLawfulBasis: vital_interest_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
      allowedRegions:
        - requester_region
        - provider_region
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - missing_connection_matchmaking_consent
      - directory_write_attempt_detected
      - cross_workspace_access
      - region_not_permitted
      - rate_limit_exceeded

  - pluginId: foundation
    command: foundation.connection.thread.create
    version: 1.0.0
    requiredRoles:
      - member
      - provider
    attributePolicies:
      tenancy: same_workspace
      threadParticipants: survivor_and_provider_only
      directoryDataAccess: read_only_projection
    consentRequirements:
      scopes:
        - survivor_provider_contact
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
      dataResidencyMode: participant_region_pinning
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - missing_survivor_provider_contact_consent
      - participant_not_verified
      - cross_workspace_access
      - blocked_contact_pair
      - rate_limit_exceeded

  - pluginId: foundation
    command: foundation.connection.message.send
    version: 1.0.0
    requiredRoles:
      - member
      - provider
    attributePolicies:
      tenancy: same_workspace
      threadMembership: required
      moderationGate: required
    consentRequirements:
      scopes:
        - survivor_provider_contact
        - sensitive_messaging
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
      messageStorageRegion: thread_region
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - missing_sensitive_messaging_consent
      - actor_not_thread_participant
      - prohibited_content_detected
      - region_not_permitted
      - stream_quota_red_state
      - rate_limit_exceeded

  - pluginId: foundation
    command: foundation.connection.call.session.create
    version: 1.0.0
    requiredRoles:
      - member
      - provider
    attributePolicies:
      tenancy: same_workspace
      threadMembership: required
      callParticipantLimit: one_to_one_only
    consentRequirements:
      scopes:
        - survivor_provider_contact
        - realtime_voice_video
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
      mediaRouting: regional_pinning_required
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - missing_realtime_voice_video_consent
      - actor_not_thread_participant
      - participant_limit_exceeded
      - region_not_permitted
      - stream_video_minutes_budget_exceeded
      - rate_limit_exceeded

  - pluginId: foundation
    command: foundation.quote.request.create
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      requestOwnership: actor_is_survivor
      quoteRecipientEligibility: verified_provider_required
    consentRequirements:
      scopes:
        - quote_request_processing
      fallbackLawfulBasis: contract_preparation
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
      quoteProcessingRegion: survivor_region
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - missing_quote_request_processing_consent
      - provider_not_eligible
      - thread_not_active
      - region_not_permitted
      - rate_limit_exceeded

  - pluginId: foundation
    command: foundation.quote.request.state.update
    version: 1.0.0
    requiredRoles:
      - member
      - provider
    attributePolicies:
      tenancy: same_workspace
      stateTransitionMatrix: enforced
      actorMustBeParticipant: true
    consentRequirements:
      scopes:
        - quote_request_processing
      fallbackLawfulBasis: contract_preparation
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
      quoteProcessingRegion: thread_region
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - invalid_state_transition
      - actor_not_authorized_for_transition
      - missing_quote_request_processing_consent
      - region_not_permitted
      - rate_limit_exceeded

  - pluginId: foundation
    command: foundation.quote.request.history.list
    version: 1.0.0
    requiredRoles:
      - member
      - provider
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnHistoryScope: true
      historyDataMinimization: required
    consentRequirements:
      scopes:
        - quote_request_processing
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authorized_for_history_scope
      - cross_workspace_access
      - missing_quote_request_processing_consent
      - region_not_permitted

  - pluginId: foundation
    command: foundation.connection.history.list
    version: 1.0.0
    requiredRoles:
      - member
      - provider
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnHistoryScope: true
      includeContentByPolicy: bounded
    consentRequirements:
      scopes:
        - survivor_provider_contact
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
      messageAndCallHistoryRegion: thread_region
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authorized_for_history_scope
      - retention_window_expired
      - region_not_permitted
      - cross_workspace_access

  - pluginId: foundation
    command: foundation.notification.preferences.update
    version: 1.0.0
    requiredRoles:
      - member
      - provider
    attributePolicies:
      tenancy: same_workspace
      actorCanMutateOwnPreferencesOnly: true
      quietHourBoundsValidation: required
    consentRequirements:
      scopes:
        - notifications_foundation
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_profile_owner
      - missing_notifications_foundation_consent
      - invalid_quiet_hour_range

  - pluginId: foundation
    command: foundation.notification.event.ack
    version: 1.0.0
    requiredRoles:
      - member
      - provider
    attributePolicies:
      tenancy: same_workspace
      actorCanAckOwnNotificationsOnly: true
      statusTransitionMatrix: enforced
    consentRequirements:
      scopes:
        - notifications_foundation
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_notification_owner
      - invalid_status_transition
      - notification_event_not_found

  - pluginId: foundation
    command: foundation.safeguards.rate_limit.evaluate
    version: 1.0.0
    requiredRoles:
      - service
      - admin
    attributePolicies:
      tenancy: same_workspace
      decisionEngineIntegrity: server_only
      commandNameMustBeKnown: true
    consentRequirements:
      scopes: []
      fallbackLawfulBasis: legitimate_interest_service_reliability
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - unknown_command
      - unsigned_service_principal
      - invalid_workspace_context

  - pluginId: foundation
    command: foundation.admin.capacity.policy.update
    version: 1.0.0
    requiredRoles:
      - admin
      - operations
    attributePolicies:
      tenancy: same_workspace
      makerTierThresholdGuardrails: enforced
      twoPersonReviewRequired: true
    consentRequirements:
      scopes:
        - operational_governance
      fallbackLawfulBasis: none
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - insufficient_role
      - missing_operational_governance_scope
      - missing_second_reviewer
      - threshold_bands_invalid
      - unresolved_quota_impact_note

changelog:
  - date: 2026-02-24
    change: Initial Foundation access policy contracts added with explicit consent, region, high-risk, and deny-condition controls for all v1 commands.
