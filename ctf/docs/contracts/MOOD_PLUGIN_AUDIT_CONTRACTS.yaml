auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: mood
    command: mood.check.submit
    commandVersion: 1.0.0
    purpose: wellbeing_checkin_tracking
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        moodBoundsCheck: pass_or_fail
        cooldownCheck: pass_or_fail
    dataClassesAccessed:
      - mood_value_metadata
      - mood_check_timing_metadata
    targetContext:
      workspaceId: workspace_identifier
      clientId: client_identifier
      checkId: check_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: mood
    command: mood.check.eligibility.fetch
    commandVersion: 1.0.0
    purpose: wellbeing_checkin_eligibility
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        clientIdCheck: pass_or_fail
    dataClassesAccessed:
      - mood_check_eligibility_metadata
    targetContext:
      workspaceId: workspace_identifier
      clientId: client_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class
