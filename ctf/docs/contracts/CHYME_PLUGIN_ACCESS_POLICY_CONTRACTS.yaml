policies:
  - pluginId: chyme
    command: chyme.room.state.fetch
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      approvalGate: approved_user_or_admin
      roomMembershipUpsertAllowed: true
    consentRequirements:
      scopes:
        - chyme_room_access
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - actor_not_approved
      - cross_workspace_access

  - pluginId: chyme
    command: chyme.messages.list
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      approvalGate: approved_user_or_admin
      messageReadLimit: "1_to_100"
    consentRequirements:
      scopes:
        - chyme_chat_participation
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - actor_not_approved
      - cross_workspace_access

  - pluginId: chyme
    command: chyme.message.send
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      approvalGate: approved_user_or_admin
      messageLengthBounds: "1_to_1000"
      messageTrimRequired: true
    consentRequirements:
      scopes:
        - chyme_chat_participation
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - actor_not_approved
      - empty_or_oversized_message
      - cross_workspace_access

  - pluginId: chyme
    command: chyme.call.join
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      approvalGate: approved_user_or_admin
      streamConfigurationRequired: true
    consentRequirements:
      scopes:
        - chyme_voice_participation
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - actor_not_approved
      - stream_not_configured
      - cross_workspace_access

  - pluginId: chyme
    command: chyme.profile.delete.service
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnTargetProfile: true
      deletionScopeLocked: service_only
    consentRequirements:
      scopes:
        - chyme_service_deletion
      fallbackLawfulBasis: legal_obligation_data_rights
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - actor_not_profile_owner
      - deletion_scope_invalid
      - cross_workspace_access

  - pluginId: chyme
    command: account.profile.delete.full
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      actorMustOwnTargetProfile: true
      deletionScopeLocked: account
      orchestratorRequired: true
    consentRequirements:
      scopes:
        - account_deletion_request
      fallbackLawfulBasis: legal_obligation_data_rights
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: true
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - actor_not_profile_owner
      - deletion_scope_invalid
      - cross_workspace_access
