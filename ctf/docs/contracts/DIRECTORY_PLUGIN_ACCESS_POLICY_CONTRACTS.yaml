policies:
  - pluginId: directory
    command: directory.profile.upsert
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      profileOwnershipOrAdmin: required
      claimedUnclaimedRules: enforced
    consentRequirements:
      scopes:
        - directory_profile_management
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authorized_for_profile
      - invalid_claimed_unclaimed_transition
      - cross_workspace_access

  - pluginId: directory
    command: directory.list.fetch
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      publicVisibilityFilter: required
    consentRequirements:
      scopes:
        - directory_discovery
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - cross_workspace_access

  - pluginId: directory
    command: directory.admin.announcement.upsert
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      adminRouteGuard: required
    consentRequirements:
      scopes:
        - directory_admin_operations
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - csrf_validation_failed
      - cross_workspace_access

  - pluginId: directory
    command: directory.public.fetch
    version: 1.0.0
    requiredRoles: []
    attributePolicies:
      publicProjectionOnly: required
      antiScrapingThreshold: enforced
    consentRequirements:
      scopes:
        - directory_public_projection
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - profile_not_public
      - anti_scraping_threshold_exceeded

  - pluginId: directory
    command: directory.admin.profile.assign
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      adminRouteGuard: required
      assignmentOwnershipRules: enforced
    consentRequirements:
      scopes:
        - directory_admin_operations
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - csrf_validation_failed
      - cross_workspace_access

  - pluginId: directory
    command: directory.admin.profile.delete
    version: 1.0.0
    requiredRoles:
      - admin
    attributePolicies:
      tenancy: same_workspace
      adminRouteGuard: required
      unclaimedOnlyDelete: enforced
    consentRequirements:
      scopes:
        - directory_admin_operations
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_admin
      - csrf_validation_failed
      - invalid_claimed_unclaimed_transition

  - pluginId: directory
    command: directory.profile.delete.service
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      profileOwnershipOrAdmin: required
    consentRequirements:
      scopes:
        - directory_profile_management
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authorized_for_profile
      - cross_workspace_access
