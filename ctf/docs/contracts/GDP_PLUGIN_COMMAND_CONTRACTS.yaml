contracts:
  - pluginId: gross-domestic-product
    command: metrics.list
    version: 1.0.0
    description: List GDP canonical metrics available for authenticated transparency views.
    inputSchema:
      period:
        type: string
        required: false
        enum:
          - year
          - quarter
          - month
      year:
        type: integer
        required: false
      includeDefinitions:
        type: boolean
        required: false
    outputSchema:
      metrics:
        type: array
      snapshotVersion:
        type: string
      generatedAt:
        type: string
    dataAccess:
      - gdp_metric_snapshots
      - canonical_metrics_registry
    purpose: transparency_reporting
    retentionClass: derived_medium_lived
    idempotency: true

  - pluginId: gross-domestic-product
    command: metrics.get
    version: 1.0.0
    description: Retrieve a specific GDP metric time series and metadata.
    inputSchema:
      metricId:
        type: string
        required: true
      startDate:
        type: string
        required: false
      endDate:
        type: string
        required: false
    outputSchema:
      metric:
        type: object
      points:
        type: array
    dataAccess:
      - gdp_metric_snapshots
      - canonical_metrics_registry
    purpose: transparency_reporting
    retentionClass: derived_medium_lived
    idempotency: true

  - pluginId: gross-domestic-product
    command: dashboard.snapshot.get
    version: 1.0.0
    description: Get aggregate GDP dashboard snapshot for authenticated survivor-facing view.
    inputSchema:
      year:
        type: integer
        required: true
      includeRolloutProgress:
        type: boolean
        required: false
    outputSchema:
      totalGDP:
        type: number
      serviceGDP:
        type: number
      goodsGDP:
        type: number
      perCapita:
        type: number
      categoryBreakdown:
        type: array
      providerTierBreakdown:
        type: array
      rolloutProgress:
        type: object
    dataAccess:
      - gdp_metric_snapshots
      - gdp_category_breakdowns
      - gdp_provider_tier_snapshots
      - gdp_rollout_actuals
    purpose: transparency_reporting
    retentionClass: derived_medium_lived
    idempotency: true

  - pluginId: gross-domestic-product
    command: rollout.progress.get
    version: 1.0.0
    description: Retrieve aggregate GDP rollout progress against yearly targets.
    inputSchema:
      startYear:
        type: integer
        required: false
      endYear:
        type: integer
        required: false
      includeCategoryGaps:
        type: boolean
        required: false
    outputSchema:
      milestones:
        type: array
      annualProgress:
        type: array
      categoryGaps:
        type: array
    dataAccess:
      - gdp_rollout_targets
      - gdp_rollout_actuals
      - gdp_category_breakdowns
    purpose: transparency_reporting
    retentionClass: derived_medium_lived
    idempotency: true

  - pluginId: gross-domestic-product
    command: scenario.assumptions.get
    version: 1.0.0
    description: Retrieve published GDP scenario assumptions and interpretation notes.
    inputSchema:
      scenarioId:
        type: string
        required: false
      effectiveYear:
        type: integer
        required: false
    outputSchema:
      assumptions:
        type: array
      caveats:
        type: array
      generatedAt:
        type: string
    dataAccess:
      - gdp_rollout_targets
      - canonical_metrics_registry
    purpose: transparency_reporting
    retentionClass: derived_medium_lived
    idempotency: true

  - pluginId: gross-domestic-product
    command: admin.metric.propose
    version: 1.0.0
    description: Propose a new canonical GDP metric definition or revision.
    inputSchema:
      proposedMetric:
        type: object
        required: true
      justification:
        type: string
        required: true
      changeType:
        type: string
        required: true
        enum:
          - add
          - revise
          - deprecate
    outputSchema:
      proposalId:
        type: string
      status:
        type: string
    dataAccess:
      - canonical_metrics_registry
      - gdp_metric_definition_events
    purpose: metric_governance
    retentionClass: audit_long_lived
    idempotency: false

  - pluginId: gross-domestic-product
    command: admin.metric.approve
    version: 1.0.0
    description: Approve a metric proposal and publish definition changes.
    inputSchema:
      proposalId:
        type: string
        required: true
      decision:
        type: string
        required: true
        enum:
          - approve
          - reject
      decisionNote:
        type: string
        required: false
    outputSchema:
      metricId:
        type: string
      status:
        type: string
      publishedVersion:
        type: string
    dataAccess:
      - canonical_metrics_registry
      - gdp_metric_definition_events
      - gdp_publish_events
    purpose: metric_governance
    retentionClass: audit_long_lived
    idempotency: false

  - pluginId: gross-domestic-product
    command: admin.snapshot.publish
    version: 1.0.0
    description: Publish an approved GDP snapshot for authenticated survivor access.
    inputSchema:
      year:
        type: integer
        required: true
      snapshotPayload:
        type: object
        required: true
      sourceRunId:
        type: string
        required: true
    outputSchema:
      snapshotId:
        type: string
      status:
        type: string
      publishedAt:
        type: string
    dataAccess:
      - gdp_metric_snapshots
      - gdp_category_breakdowns
      - gdp_provider_tier_snapshots
      - gdp_publish_events
    purpose: publication_governance
    retentionClass: audit_long_lived
    idempotency: false

  - pluginId: gross-domestic-product
    command: admin.backfill.run
    version: 1.0.0
    description: Run controlled historical GDP backfill to recompute aggregate snapshots.
    inputSchema:
      startYear:
        type: integer
        required: true
      endYear:
        type: integer
        required: true
      dryRun:
        type: boolean
        required: false
      reason:
        type: string
        required: true
    outputSchema:
      backfillRunId:
        type: string
      status:
        type: string
      yearsProcessed:
        type: array
      requiresPublishApproval:
        type: boolean
    dataAccess:
      - gdp_metric_snapshots
      - gdp_category_breakdowns
      - gdp_provider_tier_snapshots
      - gdp_rollout_actuals
      - gdp_publish_events
    purpose: publication_governance
    retentionClass: audit_long_lived
    idempotency: false
