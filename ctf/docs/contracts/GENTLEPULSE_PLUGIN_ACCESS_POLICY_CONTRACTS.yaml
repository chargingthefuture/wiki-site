policies:
  - pluginId: gentlepulse
    command: gentlepulse.library.list
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      onlyActiveMeditations: true
    consentRequirements:
      scopes:
        - gentlepulse_library_access
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - cross_workspace_access

  - pluginId: gentlepulse
    command: gentlepulse.meditation.play.record
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      meditationMustBeActive: true
    consentRequirements:
      scopes:
        - gentlepulse_engagement_tracking
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - meditation_not_active

  - pluginId: gentlepulse
    command: gentlepulse.rating.upsert
    version: 1.0.0
    requiredRoles:
      - member
    attributePolicies:
      tenancy: same_workspace
      actorCanRateOwnSessionOnly: true
      ratingBoundsValidation: required
    consentRequirements:
      scopes:
        - gentlepulse_feedback
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: true
    denyConditions:
      - actor_not_authenticated
      - invalid_rating_value
