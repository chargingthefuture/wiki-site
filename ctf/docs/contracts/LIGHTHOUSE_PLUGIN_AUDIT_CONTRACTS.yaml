auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: lighthouse
    command: lighthouse.profile.upsert
    commandVersion: 1.0.0
    purpose: profile_management
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        profileOwnershipCheck: pass_or_fail
        profileTypeLockCheck: pass_or_fail
    dataClassesAccessed:
      - lighthouse_profile_metadata
      - role_context_metadata
    targetContext:
      workspaceId: workspace_identifier
      profileId: profile_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: lighthouse
    command: lighthouse.match.request.create
    commandVersion: 1.0.0
    purpose: housing_matching
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        duplicateRequestCheck: pass_or_fail
        blockedPairCheck: pass_or_fail
    dataClassesAccessed:
      - match_request_metadata
      - property_listing_metadata
    targetContext:
      workspaceId: workspace_identifier
      propertyId: property_identifier
      matchId: match_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: lighthouse
    command: lighthouse.block.create
    commandVersion: 1.0.0
    purpose: user_safety_controls
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        selfBlockCheck: pass_or_fail
        safetyPolicyCheck: pass_or_fail
    dataClassesAccessed:
      - block_relation_metadata
      - safety_case_metadata
    targetContext:
      workspaceId: workspace_identifier
      blockId: block_identifier
      blockedUserId: principal_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class
