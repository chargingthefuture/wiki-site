contracts:
  - pluginId: announcements
    command: announcements.draft.create
    version: 1.0.0
    description: Create an announcement draft with targeting metadata and scheduling window.
    inputSchema:
      title:
        type: string
        required: true
      body:
        type: string
        required: true
      targeting:
        type: object
        required: true
      scheduleAt:
        type: string
        required: false
    outputSchema:
      announcementId:
        type: string
      status:
        type: string
      createdAt:
        type: string
    dataAccess:
      - announcements
      - announcement_revisions
      - announcement_delivery_events
    purpose: broadcast_authoring
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: announcements
    command: announcements.draft.update
    version: 1.0.0
    description: Update a draft announcement before publish.
    inputSchema:
      announcementId:
        type: string
        required: true
      title:
        type: string
        required: true
      body:
        type: string
        required: true
      targeting:
        type: object
        required: false
    outputSchema:
      announcementId:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    dataAccess:
      - announcements
      - announcement_revisions
    purpose: broadcast_authoring
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: announcements
    command: announcements.publish
    version: 1.0.0
    description: Publish a draft announcement and trigger fan-out projection.
    inputSchema:
      announcementId:
        type: string
        required: true
      publishAt:
        type: string
        required: false
    outputSchema:
      announcementId:
        type: string
      status:
        type: string
      publishedAt:
        type: string
    dataAccess:
      - announcements
      - announcement_delivery_events
      - announcement_admin_audit_trail
    purpose: broadcast_delivery
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: announcements
    command: announcements.read.mark
    version: 1.0.0
    description: Mark an announcement as read for the requesting user.
    inputSchema:
      announcementId:
        type: string
        required: true
    outputSchema:
      announcementId:
        type: string
      readAt:
        type: string
    dataAccess:
      - announcement_user_state
    purpose: acknowledgement_tracking
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: announcements
    command: announcements.archive
    version: 1.0.0
    description: Archive a published announcement.
    inputSchema:
      announcementId:
        type: string
        required: true
    outputSchema:
      announcementId:
        type: string
      status:
        type: string
      archivedAt:
        type: string
    dataAccess:
      - announcements
      - announcement_delivery_events
      - announcement_admin_audit_trail
    purpose: broadcast_delivery
    retentionClass: transactional_long_lived
    idempotency: true

  - pluginId: announcements
    command: announcements.dismiss
    version: 1.0.0
    description: Dismiss a non-mandatory announcement for the current user.
    inputSchema:
      announcementId:
        type: string
        required: true
    outputSchema:
      announcementId:
        type: string
      dismissedAt:
        type: string
    dataAccess:
      - announcement_user_state
      - announcements
    purpose: acknowledgement_tracking
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: announcements
    command: announcements.targeting.validate
    version: 1.0.0
    description: Validate announcement targeting constraints before publish.
    inputSchema:
      targeting:
        type: object
        required: true
    outputSchema:
      valid:
        type: boolean
      normalizedTargeting:
        type: object
    dataAccess:
      - announcements
    purpose: broadcast_governance
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: announcements
    command: announcements.membership.event.emit
    version: 1.0.0
    description: Emit membership events to recalculate audience visibility.
    inputSchema:
      userId:
        type: string
        required: true
      pluginId:
        type: string
        required: true
      eventType:
        type: string
        required: true
      requestId:
        type: string
        required: false
      traceId:
        type: string
        required: false
    outputSchema:
      streamEmitted:
        type: boolean
    dataAccess:
      - announcement_membership_events
      - announcement_delivery_events
    purpose: broadcast_delivery
    retentionClass: transactional_long_lived
    idempotency: false
