auditEvents:
  # ─── Timeline ──────────────────────────────────────────────────────────
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: feed
    command: feed.timeline.fetch
    commandVersion: 2.0.0
    purpose: timeline_discovery
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        visibilityPolicyCheck: pass_or_fail
    dataClassesAccessed:
      - feed_timeline_projection
      - announcement_feed_projection
      - feed_questions_projection
      - feed_community_projection
    targetContext:
      workspaceId: workspace_identifier
      timelineRequestId: request_identifier
      channel: channel_filter
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: feed
    command: feed.item.read.mark
    commandVersion: 1.0.0
    purpose: read_state_management
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        actorOwnershipCheck: pass_or_fail
        tenancyCheck: pass_or_fail
    dataClassesAccessed:
      - feed_read_state_metadata
    targetContext:
      workspaceId: workspace_identifier
      itemId: item_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
