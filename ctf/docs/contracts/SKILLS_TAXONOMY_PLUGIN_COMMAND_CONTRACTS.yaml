contracts:
  - pluginId: skills-taxonomy
    command: skills-taxonomy.hierarchy.get
    version: 1.0.0
    description: Read the ordered sector to job title to skill hierarchy for approved consumers.
    inputSchema:
      includeInactive:
        type: boolean
        required: false
      locale:
        type: string
        required: false
    outputSchema:
      items:
        type: array
      generatedAt:
        type: string
    dataAccess:
      - skills_taxonomy_sectors
      - skills_taxonomy_job_titles
      - skills_taxonomy_skills
    purpose: taxonomy_read_model
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: skills-taxonomy
    command: skills-taxonomy.flattened.get
    version: 1.0.0
    description: Read flattened taxonomy projection for selector and compatibility consumers.
    inputSchema:
      includeInactive:
        type: boolean
        required: false
      includeAliases:
        type: boolean
        required: false
    outputSchema:
      items:
        type: array
      generatedAt:
        type: string
    dataAccess:
      - skills_taxonomy_flattened_projection
    purpose: taxonomy_read_model
    retentionClass: derived_short_lived
    idempotency: true

  - pluginId: skills-taxonomy
    command: skills-taxonomy.sector.create
    version: 1.0.0
    description: Create a new taxonomy sector with governance metadata and display ordering.
    inputSchema:
      name:
        type: string
        required: true
      displayOrder:
        type: integer
        required: false
      workforceShare:
        type: number
        required: false
    outputSchema:
      sectorId:
        type: string
      status:
        type: string
      createdAt:
        type: string
    dataAccess:
      - skills_taxonomy_sectors
      - skills_taxonomy_audit_log
    purpose: taxonomy_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: skills-taxonomy
    command: skills-taxonomy.sector.update
    version: 1.0.0
    description: Update sector metadata, ordering, and governed state.
    inputSchema:
      sectorId:
        type: string
        required: true
      name:
        type: string
        required: false
      displayOrder:
        type: integer
        required: false
      workforceShare:
        type: number
        required: false
      isActive:
        type: boolean
        required: false
    outputSchema:
      sectorId:
        type: string
      updatedAt:
        type: string
    dataAccess:
      - skills_taxonomy_sectors
      - skills_taxonomy_audit_log
    purpose: taxonomy_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: skills-taxonomy
    command: skills-taxonomy.sector.delete
    version: 1.0.0
    description: Delete a sector when dependency checks and destructive-action policy gates are satisfied.
    inputSchema:
      sectorId:
        type: string
        required: true
      reason:
        type: string
        required: true
      force:
        type: boolean
        required: false
    outputSchema:
      sectorId:
        type: string
      deleted:
        type: boolean
      deletedAt:
        type: string
    dataAccess:
      - skills_taxonomy_sectors
      - skills_taxonomy_dependency_graph
      - skills_taxonomy_audit_log
    purpose: taxonomy_destructive_governance
    retentionClass: audit_long_lived
    idempotency: false

  - pluginId: skills-taxonomy
    command: skills-taxonomy.job-title.create
    version: 1.0.0
    description: Create a taxonomy job title under a parent sector.
    inputSchema:
      sectorId:
        type: string
        required: true
      name:
        type: string
        required: true
      displayOrder:
        type: integer
        required: false
    outputSchema:
      jobTitleId:
        type: string
      status:
        type: string
      createdAt:
        type: string
    dataAccess:
      - skills_taxonomy_job_titles
      - skills_taxonomy_audit_log
    purpose: taxonomy_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: skills-taxonomy
    command: skills-taxonomy.job-title.update
    version: 1.0.0
    description: Update taxonomy job title metadata under enforced parent-child integrity.
    inputSchema:
      jobTitleId:
        type: string
        required: true
      name:
        type: string
        required: false
      displayOrder:
        type: integer
        required: false
      sectorId:
        type: string
        required: false
      isActive:
        type: boolean
        required: false
    outputSchema:
      jobTitleId:
        type: string
      updatedAt:
        type: string
    dataAccess:
      - skills_taxonomy_job_titles
      - skills_taxonomy_audit_log
    purpose: taxonomy_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: skills-taxonomy
    command: skills-taxonomy.job-title.delete
    version: 1.0.0
    description: Delete a job title when dependency-impact checks permit the destructive action.
    inputSchema:
      jobTitleId:
        type: string
        required: true
      reason:
        type: string
        required: true
      force:
        type: boolean
        required: false
    outputSchema:
      jobTitleId:
        type: string
      deleted:
        type: boolean
      deletedAt:
        type: string
    dataAccess:
      - skills_taxonomy_job_titles
      - skills_taxonomy_dependency_graph
      - skills_taxonomy_audit_log
    purpose: taxonomy_destructive_governance
    retentionClass: audit_long_lived
    idempotency: false

  - pluginId: skills-taxonomy
    command: skills-taxonomy.skill.create
    version: 1.0.0
    description: Create a taxonomy skill record under a parent job title.
    inputSchema:
      jobTitleId:
        type: string
        required: true
      name:
        type: string
        required: true
      displayOrder:
        type: integer
        required: false
      aliases:
        type: array
        required: false
    outputSchema:
      skillId:
        type: string
      status:
        type: string
      createdAt:
        type: string
    dataAccess:
      - skills_taxonomy_skills
      - skills_taxonomy_audit_log
    purpose: taxonomy_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: skills-taxonomy
    command: skills-taxonomy.skill.update
    version: 1.0.0
    description: Update taxonomy skill metadata and parent linkage under integrity constraints.
    inputSchema:
      skillId:
        type: string
        required: true
      name:
        type: string
        required: false
      displayOrder:
        type: integer
        required: false
      jobTitleId:
        type: string
        required: false
      aliases:
        type: array
        required: false
      isActive:
        type: boolean
        required: false
    outputSchema:
      skillId:
        type: string
      updatedAt:
        type: string
    dataAccess:
      - skills_taxonomy_skills
      - skills_taxonomy_audit_log
    purpose: taxonomy_governance
    retentionClass: audit_long_lived
    idempotency: true

  - pluginId: skills-taxonomy
    command: skills-taxonomy.skill.delete
    version: 1.0.0
    description: Delete a skill when dependency checks and destructive policy requirements are satisfied.
    inputSchema:
      skillId:
        type: string
        required: true
      reason:
        type: string
        required: true
      force:
        type: boolean
        required: false
    outputSchema:
      skillId:
        type: string
      deleted:
        type: boolean
      deletedAt:
        type: string
    dataAccess:
      - skills_taxonomy_skills
      - skills_taxonomy_dependency_graph
      - skills_taxonomy_audit_log
    purpose: taxonomy_destructive_governance
    retentionClass: audit_long_lived
    idempotency: false

  - pluginId: skills-taxonomy
    command: skills-taxonomy.dependency-impact.preview
    version: 1.0.0
    description: Preview cross-plugin dependency impact before sector, job title, or skill destructive changes.
    inputSchema:
      targetType:
        type: string
        required: true
      targetId:
        type: string
        required: true
      operation:
        type: string
        required: true
    outputSchema:
      targetType:
        type: string
      targetId:
        type: string
      impactedConsumers:
        type: array
      riskLevel:
        type: string
    dataAccess:
      - skills_taxonomy_dependency_graph
      - skills_taxonomy_consumer_bindings
    purpose: taxonomy_dependency_governance
    retentionClass: audit_long_lived
    idempotency: true

changelog:
  - date: 2026-02-25
    change: Initial Skills Taxonomy command contract skeleton added with hierarchy reads, CRUD commands, and dependency-impact preview governance.
