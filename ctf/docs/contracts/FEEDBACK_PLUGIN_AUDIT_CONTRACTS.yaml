audits:
  # ─── Feedback Submission Audit ──────────────────────────────────────
  - pluginId: feedback
    command: feedback.submit
    version: 1.0.0
    auditableEvent: feedback_submitted
    description: Log when a user submits feedback with full details.
    auditedFields:
      - feedback_id
      - user_id
      - type
      - title
      - body
      - category
      - metadata
    storageTable: feedback_audit
    retentionDays: 2555  # ~7 years
    driftCorrection: true
    alertConditions: []

  # ─── Feedback Voting Audit ─────────────────────────────────────────
  - pluginId: feedback
    command: feedback.vote
    version: 1.0.0
    auditableEvent: feedback_voted
    description: Log when a user votes on feedback.
    auditedFields:
      - feedback_id
      - user_id
      - vote_action
    storageTable: feedback_audit
    retentionDays: 2555
    driftCorrection: true
    alertConditions: []

  # ─── Feedback Triage Audit ────────────────────────────────────────
  - pluginId: feedback
    command: feedback.triage
    version: 1.0.0
    auditableEvent: feedback_triaged
    description: Log admin triage actions with changes to priority, category, and status.
    auditedFields:
      - feedback_id
      - actor_id
      - priority_old
      - priority_new
      - category_old
      - category_new
      - status_old
      - status_new
    storageTable: feedback_audit
    retentionDays: 2555
    driftCorrection: true
    alertConditions:
      - severity: high
        condition: priority_changed_to_critical

  # ─── Feedback Link Audit ───────────────────────────────────────────
  - pluginId: feedback
    command: feedback.linkToTask
    version: 1.0.0
    auditableEvent: feedback_linked_to_task
    description: Log when feedback is linked to a PM task.
    auditedFields:
      - feedback_id
      - task_id
      - actor_id
      - status_change
    storageTable: feedback_audit
    retentionDays: 2555
    driftCorrection: true
    alertConditions: []

  # ─── Feedback Resolution Audit ─────────────────────────────────────
  - pluginId: feedback
    command: feedback.resolve
    version: 1.0.0
    auditableEvent: feedback_resolved
    description: Log when feedback is marked as resolved with resolution note.
    auditedFields:
      - feedback_id
      - actor_id
      - resolution_note
      - status_change
    storageTable: feedback_audit
    retentionDays: 2555
    driftCorrection: true
    alertConditions: []

  # ─── Feedback Listing Audit ────────────────────────────────────────
  - pluginId: feedback
    command: feedback.list
    version: 1.0.0
    auditableEvent: feedback_list_accessed
    description: Log admin access to feedback listing (non-sensitive query details only).
    auditedFields:
      - actor_id
      - filters_applied
      - result_count
    storageTable: feedback_audit
    retentionDays: 365  # 1 year
    driftCorrection: false
    alertConditions: []

  # ─── Data Deletion Audit (User Deletion) ──────────────────────────
  - pluginId: feedback
    command: feedback.deleteUserData
    version: 1.0.0
    auditableEvent: feedback_user_data_deleted
    description: Log when user feedback and votes are permanently deleted during account deletion.
    auditedFields:
      - user_id
      - feedback_count_deleted
      - votes_count_deleted
      - deletion_timestamp
    storageTable: feedback_audit
    retentionDays: 2555
    driftCorrection: true
    alertConditions:
      - severity: medium
        condition: bulk_feedback_deleted
