policies:
  - pluginId: workforce
    command: workforce.dashboard.fetch
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      reportProjectionOnly: true
    consentRequirements:
      scopes:
        - workforce_reporting
      fallbackLawfulBasis: legitimate_interest_safety_support
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - cross_workspace_access

  - pluginId: workforce
    command: workforce.profile.fetch
    version: 1.0.0
    requiredRoles:
      - member
      - admin
    attributePolicies:
      tenancy: same_workspace
      profileOwnershipOrAdmin: required
    consentRequirements:
      scopes:
        - workforce_profile_management
      fallbackLawfulBasis: explicit_consent_required
    regionRestrictions:
      allowedTransferMechanisms:
        - local_processing
        - scc
    highRiskFlags:
      containsPHI: false
      requiresAdditionalAudit: false
    denyConditions:
      - actor_not_authenticated
      - actor_not_authorized_for_profile

  - pluginId: workforce
    command: workforce.profile.update
