auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: announcements
    command: announcements.draft.create
    commandVersion: 1.0.0
    purpose: broadcast_authoring
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        targetingValidationCheck: pass_or_fail
        regionCheck: pass_or_fail
    dataClassesAccessed:
      - announcement_content_metadata
      - announcement_targeting_metadata
    targetContext:
      workspaceId: workspace_identifier
      announcementId: announcement_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

