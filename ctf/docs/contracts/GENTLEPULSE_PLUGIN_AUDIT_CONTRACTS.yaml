auditEvents:
  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: gentlepulse
    command: gentlepulse.library.list
    commandVersion: 1.0.0
    purpose: wellbeing_content_discovery
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        activeContentFilterCheck: pass_or_fail
    dataClassesAccessed:
      - meditation_catalog_projection
      - favorites_projection
    targetContext:
      workspaceId: workspace_identifier
      listingRequestId: request_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: gentlepulse
    command: gentlepulse.meditation.play.record
    commandVersion: 1.0.0
    purpose: wellbeing_engagement_tracking
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        meditationActiveCheck: pass_or_fail
    dataClassesAccessed:
      - meditation_play_event_metadata
      - meditation_media_metadata
    targetContext:
      workspaceId: workspace_identifier
      meditationId: meditation_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class

  - eventId: uuid
    timestamp: rfc3339
    actorId: principal
    pluginId: gentlepulse
    command: gentlepulse.rating.upsert
    commandVersion: 1.0.0
    purpose: wellbeing_feedback
    policyDecision:
      status: allow_or_deny
      reason: policy_reason_code
      evidence:
        roleCheck: pass_or_fail
        ratingBoundsCheck: pass_or_fail
        profileOwnershipCheck: pass_or_fail
    dataClassesAccessed:
      - meditation_rating_metadata
      - rating_aggregate_metadata
    targetContext:
      workspaceId: workspace_identifier
      meditationId: meditation_identifier
    requestId: request_identifier
    traceId: trace_identifier
    result:
      status: success_or_failure
      errorCategory: none_or_error_class
