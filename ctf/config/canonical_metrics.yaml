  - id: service_credits_total_supply
    name: Service Credits Total Supply
    description: Net Service Credits in circulation calculated as minted minus burned credits.
    owner: service-credits-governance@chargingthefuture.org
    data_type: integer
    unit: SC
    calculation: |
      SELECT COALESCE(SUM(CASE WHEN event_type = 'mint' THEN amount_units ELSE 0 END), 0)
           - COALESCE(SUM(CASE WHEN event_type = 'burn' THEN amount_units ELSE 0 END), 0)
           AS service_credits_total_supply
      FROM service_credits_governance_events
      WHERE occurred_at <= :as_of;
    inputs:
      - name: service_credits_governance_events.event_type
        type: string
      - name: service_credits_governance_events.amount_units
        type: integer
      - name: service_credits_governance_events.occurred_at
        type: datetime
    example_values:
      - 125000000
      - 127500000
    last_updated: "2026-02-24T00:00:00Z"
    update_cadence: hourly
    retention: 120 months
    allowed_thresholds:
      min: 0
      alert_rules:
        - "alert_if_24h_growth_percent >= 10"

  - id: service_credits_minted_total
    name: Service Credits Minted Total
    description: Cumulative credits minted through governance-approved issuance events.
    owner: service-credits-governance@chargingthefuture.org
    data_type: integer
    unit: SC
    calculation: |
      SELECT COALESCE(SUM(amount_units), 0) AS service_credits_minted_total
      FROM service_credits_governance_events
      WHERE event_type = 'mint'
        AND occurred_at <= :as_of;
    inputs:
      - name: service_credits_governance_events.event_type
        type: string
