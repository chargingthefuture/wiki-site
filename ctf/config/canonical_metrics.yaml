  - id: service_credits_marketplace_gdp_total
    name: Service Credits Marketplace GDP Total
    description: Total settled marketplace value measured in Service Credits for the selected reporting window.
    owner: economics-team@chargingthefuture.org
    data_type: integer
    unit: SC
    calculation: |
      SELECT COALESCE(SUM(amount_units), 0) AS service_credits_marketplace_gdp_total
      FROM service_credits_transfers
      WHERE transfer_type = 'settlement'
        AND settled_at >= :window_start
        AND settled_at < :window_end;
    inputs:
      - name: service_credits_transfers.transfer_type
        type: string
      - name: service_credits_transfers.amount_units
        type: integer
      - name: service_credits_transfers.settled_at
        type: datetime
    example_values:
      - 42000000
