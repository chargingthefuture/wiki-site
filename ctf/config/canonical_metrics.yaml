  - id: service_credits_starter_grant_uptake_rate
    name: Service Credits Starter Grant Uptake Rate
    description: Percentage of newly eligible users who receive their starter grant within the onboarding window.
    owner: onboarding-ops@chargingthefuture.org
    data_type: percent
    unit: percent
    calculation: |
      WITH eligible AS (
        SELECT COUNT(*) AS total_eligible
        FROM service_credits_eligibility_events
        WHERE became_eligible_at >= :window_start
          AND became_eligible_at < :window_end
      ),
      granted AS (
        SELECT COUNT(DISTINCT target_user_id) AS total_granted
        FROM service_credits_governance_events
        WHERE event_type = 'mint'
          AND reason_code = 'starter_grant'
          AND occurred_at >= :window_start
          AND occurred_at < :window_end
      )
      SELECT CASE
               WHEN eligible.total_eligible = 0 THEN 0
               ELSE (granted.total_granted::float / eligible.total_eligible::float) * 100
             END AS service_credits_starter_grant_uptake_rate
      FROM eligible, granted;
    inputs:
      - name: service_credits_eligibility_events.became_eligible_at
        type: datetime
      - name: service_credits_governance_events.event_type
        type: string
      - name: service_credits_governance_events.reason_code
        type: string
      - name: service_credits_governance_events.target_user_id
        type: uuid
      - name: service_credits_governance_events.occurred_at
        type: datetime
    example_values:
      - 82.5
      - 90.3
    last_updated: "2026-02-24T00:00:00Z"
    update_cadence: weekly
    retention: 60 months
    allowed_thresholds:
      min: 0
      max: 100

  - id: service_credits_loan_default_rate
    name: Service Credits Loan Default Rate
    description: Percentage of originated Service Credits loans considered in default status within the reporting window.
    owner: treasury-ops@chargingthefuture.org
    data_type: percent
    unit: percent
    calculation: |
      WITH originated AS (
        SELECT COUNT(*) AS total_originated
        FROM service_credits_loans
        WHERE originated_at >= :window_start
          AND originated_at < :window_end
      ),
      defaults AS (
        SELECT COUNT(*) AS total_defaulted
        FROM service_credits_loans
        WHERE originated_at >= :window_start
          AND originated_at < :window_end
          AND status = 'defaulted'
      )
      SELECT CASE
               WHEN originated.total_originated = 0 THEN 0
               ELSE (defaults.total_defaulted::float / originated.total_originated::float) * 100
             END AS service_credits_loan_default_rate
      FROM originated, defaults;
    inputs:
      - name: service_credits_loans.originated_at
        type: datetime
      - name: service_credits_loans.status
        type: string
    example_values:
      - 3.2
      - 4.8
    last_updated: "2026-02-24T00:00:00Z"
    update_cadence: monthly
    retention: 120 months
    allowed_thresholds:
      min: 0
      max: 100
      alert_rules:
        - "alert_if_value >= 8"

  - id: service_credits_dispute_rate
    name: Service Credits Dispute Rate
    description: Ratio of disputed settled transactions to total settled transactions in the reporting window.
    owner: trust-safety@chargingthefuture.org
    data_type: percent
    unit: percent
    calculation: |
      WITH settled AS (
        SELECT COUNT(*) AS total_settled
        FROM service_credits_transfers
        WHERE transfer_type = 'settlement'
          AND settled_at >= :window_start
          AND settled_at < :window_end
      ),
      disputed AS (
        SELECT COUNT(DISTINCT transfer_id) AS total_disputed
        FROM service_credits_dispute_adjustments
        WHERE created_at >= :window_start
          AND created_at < :window_end
      )
      SELECT CASE
               WHEN settled.total_settled = 0 THEN 0
               ELSE (disputed.total_disputed::float / settled.total_settled::float) * 100
             END AS service_credits_dispute_rate
      FROM settled, disputed;
    inputs:
      - name: service_credits_transfers.transfer_type
        type: string
      - name: service_credits_transfers.settled_at
        type: datetime
      - name: service_credits_dispute_adjustments.transfer_id
        type: string
      - name: service_credits_dispute_adjustments.created_at
        type: datetime
    example_values:
      - 1.4
      - 2.1
    last_updated: "2026-02-24T00:00:00Z"
    update_cadence: daily
    retention: 120 months
    allowed_thresholds:
      min: 0
      max: 100
      alert_rules:
        - "alert_if_value >= 5"

  - id: service_credits_dispute_resolution_time_hours
    name: Service Credits Dispute Resolution Time Hours
    description: Average elapsed time in hours from dispute creation to closure for Service Credits disputes.
    owner: trust-safety@chargingthefuture.org
    data_type: float
    unit: hours
    calculation: |
      SELECT COALESCE(AVG(EXTRACT(EPOCH FROM (resolved_at - created_at)) / 3600), 0)
             AS service_credits_dispute_resolution_time_hours
      FROM service_credits_dispute_adjustments
      WHERE created_at >= :window_start
        AND created_at < :window_end
        AND status = 'resolved'
        AND resolved_at IS NOT NULL;
    inputs:
      - name: service_credits_dispute_adjustments.created_at
        type: datetime
      - name: service_credits_dispute_adjustments.resolved_at
        type: datetime|null
      - name: service_credits_dispute_adjustments.status
        type: string
    example_values:
      - 22.4
      - 17.8
    last_updated: "2026-02-24T00:00:00Z"
    update_cadence: daily
    retention: 120 months
    allowed_thresholds:
      min: 0
      alert_rules:
        - "alert_if_value >= 72"

  - id: workforce_recruited_current_count
    name: Workforce Recruited (Current)
    description: Count of users whose latest inferred workforce recruited state is true, derived only from Directory profile create/update writes.
    owner: marketplace-ops@chargingthefuture.org
    data_type: integer
    unit: users
    calculation: |
      WITH latest_inferred_state AS (
        SELECT DISTINCT ON (user_id)
               user_id,
               resolved_recruited,
               resolved_at
        FROM workforce_recruited_events
        WHERE source_event IN ('directory_profile_upsert', 'directory_profile_assign')
        ORDER BY user_id, resolved_at DESC, created_at DESC
      )
      SELECT COUNT(*)
      FROM latest_inferred_state
      WHERE resolved_recruited = TRUE;
    inputs:
      - name: workforce_recruited_events.user_id
        type: string
      - name: workforce_recruited_events.source_event
        type: string
      - name: workforce_recruited_events.resolved_recruited
        type: boolean
      - name: workforce_recruited_events.resolved_at
        type: datetime
      - name: workforce_recruited_events.inference_dedupe_key
        type: string
    example_values:
