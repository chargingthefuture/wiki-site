  - id: service_credits_avg_provider_monthly_earnings
    name: Service Credits Average Provider Monthly Earnings
    description: Average monthly settled earnings in Service Credits per active provider.
    owner: marketplace-ops@chargingthefuture.org
    data_type: float
    unit: SC_per_provider_month
    calculation: |
      WITH provider_monthly AS (
        SELECT recipient_user_id,
               DATE_TRUNC('month', settled_at) AS month_bucket,
               SUM(amount_units) AS monthly_earnings
        FROM service_credits_transfers
        WHERE transfer_type = 'settlement'
          AND settled_at >= :window_start
          AND settled_at < :window_end
        GROUP BY recipient_user_id, DATE_TRUNC('month', settled_at)
      )
      SELECT COALESCE(AVG(monthly_earnings), 0) AS service_credits_avg_provider_monthly_earnings
      FROM provider_monthly;
    inputs:
      - name: service_credits_transfers.recipient_user_id
        type: uuid
      - name: service_credits_transfers.transfer_type
        type: string
      - name: service_credits_transfers.amount_units
        type: integer
      - name: service_credits_transfers.settled_at
        type: datetime
    example_values:
      - 8900
      - 10450
    last_updated: "2026-02-24T00:00:00Z"
    update_cadence: monthly
    retention: 60 months
    allowed_thresholds:
      min: 0

