  - id: feed_timeline_engagement_7d
    name: Feed Timeline Engagement (7-day)
    description: Count of distinct users who viewed at least one feed item in the past 7 days.
    owner: product-feed@chargingthefuture.org
    data_type: integer
    unit: users
    calculation: |
      SELECT COUNT(DISTINCT user_id)
      FROM feed_user_read_state
      WHERE read_at >= NOW() - INTERVAL '7 days';
    inputs:
      - name: feed_user_read_state.user_id
        type: uuid
      - name: feed_user_read_state.read_at
        type: datetime
    example_values:
