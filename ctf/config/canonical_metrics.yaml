  - id: feed_llm_answer_helpful_rate
    name: Feed LLM Answer Helpful Rate
    description: Percentage of LLM-generated answers rated as helpful out of total rated answers.
    owner: product-feed@chargingthefuture.org
    data_type: percent
    unit: percent
    calculation: |
      SELECT
        (helpful::float / NULLIF(total_rated, 0)) * 100 AS helpful_pct
      FROM (
        SELECT
          COUNT(*) FILTER (WHERE rating = 'helpful') AS helpful,
          COUNT(*) AS total_rated
        FROM feed_answer_ratings
        WHERE created_at >= NOW() - INTERVAL '30 days'
      ) sub;
    inputs:
      - name: feed_answer_ratings.rating
        type: string
      - name: feed_answer_ratings.created_at
        type: datetime
    example_values:
