name: Deploy Blog to GitHub Pages

on:
  push:
    # Temporary: deploy from v3 while the legacy app stays on main.
    # Future: change this to [main] when the new app becomes primary.
    branches: [v3]
    paths:
      - "wiki-blog/**"
      - ".github/workflows/deploy-blog-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-blog
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wiki-blog

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: wiki-blog/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: wiki-blog/pnpm-lock.yaml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate content index
        run: pnpm blog:validate

      - name: Sync article registry
        run: pnpm blog:sync

      - name: Ensure generated articles.ts is committed
        run: |
          if ! git diff --exit-code -- artifacts/blog/src/lib/articles.ts; then
            echo "articles.ts is out of sync with content-index.yaml"
            echo "Run 'pnpm blog:sync' locally and commit the result."
            exit 1
          fi

      - name: Build for GitHub Pages
        run: pnpm blog:build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki-blog/artifacts/blog/dist/public

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
