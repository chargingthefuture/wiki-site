name: GitHub Actions Budget Monitor

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: github-actions-budget-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Actions Budget Monitor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate GitHub Actions budget
        id: budget
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS_MONITOR_TOKEN: ${{ secrets.GH_ACTIONS_BILLING_TOKEN }}
          GITHUB_ACTIONS_MONITOR_SCOPE: org
          GITHUB_ACTIONS_BUDGET_MINUTES: "2000"
          GITHUB_ACTIONS_BUDGET_ARTIFACT_MB: "500"
          GITHUB_ACTIONS_BUDGET_CACHE_GB: "10"
          GITHUB_ACTIONS_BUDGET_THRESHOLDS: "60,80,90"
          GITHUB_ACTIONS_BUDGET_OUTPUT_PATH: ${{ runner.temp }}/github-actions-budget.json
        run: node ctf/scripts/githubActionsBudgetMonitor.mjs

      - name: Upload budget artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-actions-budget-${{ github.run_id }}
          path: ${{ runner.temp }}/github-actions-budget.json
          retention-days: 14

      - name: Upsert budget monitor issue
        uses: actions/github-script@v7
        env:
          BUDGET_STATUS: ${{ steps.budget.outputs.status }}
          BUDGET_JSON_PATH: ${{ runner.temp }}/github-actions-budget.json
        with:
          script: |
            const fs = require('node:fs');
            const status = process.env.BUDGET_STATUS || 'unknown';
            let summary = 'No budget summary generated.';
            try {
              const raw = fs.readFileSync(process.env.BUDGET_JSON_PATH, 'utf8');
              const parsed = JSON.parse(raw);
              if (typeof parsed.summaryMarkdown === 'string' && parsed.summaryMarkdown.trim().length > 0) {
                summary = parsed.summaryMarkdown;
              }
            } catch {
              // keep fallback summary
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueTitle = 'GitHub Actions Budget Monitor';
            const labels = ['ci-budget-monitor'];

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === issueTitle);

            if (status === 'ok') {
              if (existing) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: `Status returned to OK.\n\n${summary}`,
                });

                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  state: 'closed',
                });
              }
              return;
            }

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body: summary,
                labels,
              });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body: summary,
              labels,
            });

      - name: Auto-close token rotation reminder when healthy
        if: ${{ steps.budget.outputs.status != 'degraded-auth' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const reminderTitle = 'Rotate GH_ACTIONS_BILLING_TOKEN';

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const reminderIssues = openIssues.filter((issue) => issue.title === reminderTitle);

            for (const issue of reminderIssues) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: 'Closing reminder automatically because billing monitor status is healthy (not degraded-auth).',
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
