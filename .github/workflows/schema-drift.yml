name: Schema Drift Detection

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      target:
        description: Target environment to validate
        required: true
        type: choice
        options:
          - both
          - staging
          - production
        default: both
  push:
    branches:
      - main
    paths:
      - ctf/schema.sql
      - ctf/scripts/report-live-schema-drift.mjs
      - ctf/package.json
      - .github/workflows/schema-drift.yml

permissions:
  contents: read

concurrency:
  group: schema-drift-${{ github.ref }}
  cancel-in-progress: false

jobs:
  drift-staging:
    name: Drift Check (staging)
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'both' || github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING != '' && secrets.DATABASE_URL_STAGING || vars.DATABASE_URL_STAGING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate staging DATABASE_URL secret
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing DATABASE_URL_STAGING in GitHub Actions secrets/variables."
            exit 1
          fi

      - name: Install dependencies
        working-directory: ctf
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm install --frozen-lockfile

      - name: Run live schema drift report (staging)
        working-directory: ctf
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm run schema:report-live-drift | tee ../schema-drift-staging-report.txt

      - name: Upload drift report artifact (staging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-drift-staging-report
          path: schema-drift-staging-report.txt

  drift-production:
    name: Drift Check (production)
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'both' || github.event.inputs.target == 'production'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || vars.DATABASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate production DATABASE_URL secret
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing DATABASE_URL in GitHub Actions secrets/variables."
            exit 1
          fi

      - name: Install dependencies
        working-directory: ctf
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm install --frozen-lockfile

      - name: Run live schema drift report (production)
        working-directory: ctf
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm run schema:report-live-drift | tee ../schema-drift-production-report.txt

      - name: Upload drift report artifact (production)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-drift-production-report
          path: schema-drift-production-report.txt
