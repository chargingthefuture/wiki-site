name: Wiki — Validate & Build

on:
  push:
    # Validation means CI checks only: content validation, sync check, typecheck, and build.
    # It does not publish the site.
    branches: [main]
    paths:
      - "wiki-site/**"
      - ".github/workflows/wiki-validate.yml"
  pull_request:
    paths:
      - "wiki-site/**"
      - ".github/workflows/wiki-validate.yml"

jobs:
  validate-and-build:
    name: Validate content + build wiki
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wiki-site

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: wiki-site/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: wiki-site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate content-index.yaml
        run: pnpm --filter @workspace/scripts run validate

      - name: Sync articles (in-place)
        run: pnpm --filter @workspace/scripts run sync-articles

      - name: Check articles.ts is committed in sync
        run: |
          if ! git diff --exit-code -- artifacts/wiki/src/lib/articles.ts; then
            echo ""
            echo "ERROR: articles.ts is out of sync with content-index.yaml."
            echo "Run 'pnpm wiki:sync' locally and commit the updated articles.ts."
            exit 1
          fi

      - name: Typecheck wiki
        run: pnpm --filter @workspace/wiki run typecheck

      - name: Build wiki
        env:
          BASE_PATH: /
          PORT: 5000
        run: pnpm --filter @workspace/wiki run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiki-dist
          path: wiki-site/artifacts/wiki/dist/public
          retention-days: 7
