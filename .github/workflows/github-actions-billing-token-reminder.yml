name: GitHub Actions Billing Token Rotation Reminder
on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: github-actions-billing-token-reminder
  cancel-in-progress: false

jobs:
  remind:
    name: Billing Token Reminder
    runs-on: ubuntu-latest
    steps:
      - name: Create reminder issue when due
        uses: actions/github-script@v7
        env:
          REMINDER_TITLE: "Rotate GH_ACTIONS_BILLING_TOKEN"
          REMINDER_LABEL: "ci-budget-monitor"
          REMINDER_AFTER_DAYS: "45"
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = process.env.REMINDER_TITLE;
            const label = process.env.REMINDER_LABEL;
            const afterDays = Number(process.env.REMINDER_AFTER_DAYS || '45');

            const search = `repo:${owner}/${repo} is:issue in:title "${title}" sort:created-desc`;
            const result = await github.rest.search.issuesAndPullRequests({
              q: search,
              per_page: 1,
            });

            const now = new Date();
            const latest = result.data.items?.[0];

            let shouldCreate = true;
            if (latest?.created_at) {
              const latestCreated = new Date(latest.created_at);
              const elapsedMs = now.getTime() - latestCreated.getTime();
              const elapsedDays = Math.floor(elapsedMs / (1000 * 60 * 60 * 24));
              shouldCreate = elapsedDays >= afterDays;
            }

            if (!shouldCreate) {
              core.info(`Rotation reminder not due yet.`);
              return;
            }

            const body = [
              'GitHub Actions org billing token rotation is due.',
              '',
              'Runbook: `ctf/docs/developer/GITHUB_ACTIONS_BILLING_TOKEN_RUNBOOK.md`',
              '',
              'Checklist:',
              '- [ ] Generate new PAT (classic) with `read:org`',
              '- [ ] Update org Actions secret `GH_ACTIONS_BILLING_TOKEN`',
              '- [ ] Run `.github/workflows/github-actions-budget-monitor.yml` via `workflow_dispatch`',
              '- [ ] Confirm status is not `degraded-auth`',
              '- [ ] Revoke previous PAT',
            ].join('\n');

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: [label],
            });
