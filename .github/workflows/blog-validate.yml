name: Blog — Validate & Build

on:
  push:
    # Validation means CI checks only: content validation, sync check, typecheck, and build.
    # It does not publish the site.
    branches: [v3]
    paths:
      - "wiki-blog/**"
      - ".github/workflows/blog-validate.yml"
  pull_request:
    paths:
      - "wiki-blog/**"
      - ".github/workflows/blog-validate.yml"

jobs:
  validate-and-build:
    name: Validate content + build blog
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wiki-blog

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: wiki-blog/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate content-index.yaml
        run: pnpm --filter @workspace/scripts run validate

      - name: Sync articles (in-place)
        run: pnpm --filter @workspace/scripts run sync-articles

      - name: Check articles.ts is committed in sync
        run: |
          if ! git diff --exit-code -- artifacts/blog/src/lib/articles.ts; then
            echo ""
            echo "ERROR: articles.ts is out of sync with content-index.yaml."
            echo "Run 'pnpm blog:sync' locally and commit the updated articles.ts."
            exit 1
          fi

      - name: Typecheck blog
        run: pnpm --filter @workspace/blog run typecheck

      - name: Build blog
        env:
          BASE_PATH: /
          PORT: 5000
        run: pnpm --filter @workspace/blog run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-dist
          path: wiki-blog/artifacts/blog/dist/public
          retention-days: 7
