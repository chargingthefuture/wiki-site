name: Security and Compliance

on:
  pull_request:
    branches: [main]
    paths:
      - "ctf/**"
      - ".claude/rules/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "ctf/**"
      - ".claude/rules/**"
      - ".github/workflows/**"
  schedule:
    - cron: "30 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compliance-artifacts:
    name: Compliance Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect rules artifacts
        run: |
          set -euo pipefail
          mkdir -p compliance-artifacts
          cp -R .claude/rules compliance-artifacts/rules

      - name: Upload rules artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compliance-rules-${{ github.run_id }}
          path: compliance-artifacts
          retention-days: 30
