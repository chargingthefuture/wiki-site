name: Expo Update

on:
  push:
    branches:
      - "**"
    paths:
      - "ctf/packages/mobile/**"
      - "ctf/packages/shared/**"
      - "ctf/pnpm-workspace.yaml"
      - "ctf/package.json"
      - ".github/workflows/expo-update.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  expo-eas-update:
    name: Expo EAS Update
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'rewrite-mobile-production' || ((github.ref_name == 'staging' || github.ref_name == 'release/staging') && 'rewrite-mobile-staging') || 'rewrite-mobile-preview' }}
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Validate EXPO_TOKEN presence
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "$EXPO_TOKEN" ] || { echo "Missing EXPO_TOKEN"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Resolve EAS update channel from branch
        id: target
        run: |
          set -euo pipefail
          branch_name="${GITHUB_REF_NAME}"

          channel="preview"
          if [ "$branch_name" = "main" ]; then
            channel="production"
          elif [ "$branch_name" = "staging" ] || [ "$branch_name" = "release/staging" ]; then
            channel="staging"
          fi

          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Validate mobile env contract
        env:
          MOBILE_ENV_TARGET: ${{ steps.target.outputs.channel }}
          EXPO_MOBILE_PROJECT_ID: ${{ vars.EXPO_MOBILE_PROJECT_ID }}
          MOBILE_PROJECT_ID: ${{ vars.MOBILE_PROJECT_ID }}
          EXPO_MOBILE_UPDATES_URL: ${{ vars.EXPO_MOBILE_UPDATES_URL }}
          MOBILE_UPDATES_URL: ${{ vars.MOBILE_UPDATES_URL }}
          MOBILE_APP_URL: ${{ vars.MOBILE_APP_URL }}
          EXPO_OWNER: ${{ vars.EXPO_OWNER }}
          MOBILE_CLERK_PUBLISHABLE_KEY_STAGING: ${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_STAGING }}
          MOBILE_CLERK_PUBLISHABLE_KEY_PRODUCTION: ${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_PRODUCTION }}
        run: |
          set -euo pipefail
          cd packages/mobile
          pnpm run check:mobile-env

      - name: Detect native-affecting mobile changes
        id: native_changes
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            changed_files=$(git diff --name-only "$base_sha" "$head_sha" || true)
          else
            changed_files=$(git diff --name-only HEAD~1 HEAD || true)
          fi

          native_changed="false"

          if echo "$changed_files" | grep -Eq '^ctf/packages/mobile/(android/|ios/|app\.config\.ts|eas\.json|package\.json|babel\.config\.js|metro\.config\.js)'; then
            native_changed="true"
          fi

          echo "native_changed=$native_changed" >> "$GITHUB_OUTPUT"

      - name: Publish EAS update
        if: ${{ steps.native_changes.outputs.native_changed != 'true' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          cd packages/mobile
          pnpm dlx eas-cli@latest update --branch "${{ steps.target.outputs.channel }}" --message "CI update from ${GITHUB_SHA} (${GITHUB_REF_NAME})"

      - name: Skip EAS update due to native changes
        if: ${{ steps.native_changes.outputs.native_changed == 'true' }}
        run: |
          echo "Native-affecting files changed. Skipping EAS Update."
          echo "Use EAS Build for this change set."
