name: Expo Update

on:
  push:
    branches:
      - "**"
    paths:
      - "ctf/packages/mobile/**"
      - "ctf/packages/shared/**"
      - "ctf/pnpm-workspace.yaml"
      - "ctf/package.json"
      - ".github/workflows/expo-update.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  expo-eas-update:
    name: Expo EAS Update
    runs-on: ubuntu-latest
    if: ${{ secrets.EXPO_TOKEN != '' }}
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Resolve EAS update channel from branch
        id: target
        run: |
          set -euo pipefail
          branch_name="${GITHUB_REF_NAME}"

          channel="preview"
          if [ "$branch_name" = "main" ]; then
            channel="production"
          elif [ "$branch_name" = "staging" ] || [ "$branch_name" = "release/staging" ]; then
            channel="staging"
          fi

          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Detect native-affecting mobile changes
        id: native_changes
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            changed_files=$(git diff --name-only "$base_sha" "$head_sha" || true)
          else
            changed_files=$(git diff --name-only HEAD~1 HEAD || true)
          fi

          native_changed="false"

          if echo "$changed_files" | grep -Eq '^ctf/packages/mobile/(android/|ios/|app\.config\.ts|eas\.json|package\.json|babel\.config\.js|metro\.config\.js)'; then
            native_changed="true"
          fi

          echo "native_changed=$native_changed" >> "$GITHUB_OUTPUT"

      - name: Publish EAS update
        if: steps.native_changes.outputs.native_changed != 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          cd packages/mobile
          pnpm dlx eas-cli@latest update --branch "${{ steps.target.outputs.channel }}" --message "CI update from ${GITHUB_SHA} (${GITHUB_REF_NAME})"

      - name: Skip EAS update due to native changes
        if: steps.native_changes.outputs.native_changed == 'true'
        run: |
          echo "Native-affecting files changed. Skipping EAS Update."
          echo "Use EAS Build for this change set."

  expo-eas-update-skipped:
    name: Expo EAS Update Skipped (Missing EXPO_TOKEN)
    runs-on: ubuntu-latest
    if: ${{ secrets.EXPO_TOKEN == '' }}
    steps:
      - name: Explain skip
        run: echo "EXPO_TOKEN secret is not configured. Expo update was skipped."
