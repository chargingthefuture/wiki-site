name: Expo Preview Build

on:
  pull_request:
    branches: [main]
    paths:
      - "ctf/packages/mobile/**"
      - "ctf/packages/shared/**"
      - "ctf/pnpm-workspace.yaml"
      - "ctf/package.json"
      - ".github/workflows/expo-preview.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  MOBILE_DIR: ctf/packages/mobile

jobs:
  expo-preview-android:
    name: Expo Preview Android
    runs-on: ubuntu-latest
    environment: ${{ format('rewrite-mobile-{0}', 'preview') }}
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Validate EXPO_TOKEN presence
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "$EXPO_TOKEN" ] || { echo "Missing EXPO_TOKEN"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Validate mobile Expo config exists
        run: |
          set -euo pipefail
          test -f packages/mobile/eas.json
          test -f packages/mobile/app.config.ts

      - name: Resolve profile and channel from branch
        id: target
        run: |
          set -euo pipefail
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          profile="preview"
          channel="preview"

          if [ "$branch_name" = "main" ]; then
            profile="production"
            channel="production"
          elif [ "$branch_name" = "staging" ] || [ "$branch_name" = "release/staging" ]; then
            profile="staging"
            channel="staging"
          fi

          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Validate mobile env contract
        env:
          MOBILE_ENV_TARGET: ${{ steps.target.outputs.profile }}
          EXPO_MOBILE_PROJECT_ID: ${{ vars.EXPO_MOBILE_PROJECT_ID }}
          MOBILE_PROJECT_ID: ${{ vars.MOBILE_PROJECT_ID }}
          EXPO_MOBILE_UPDATES_URL: ${{ vars.EXPO_MOBILE_UPDATES_URL }}
          MOBILE_UPDATES_URL: ${{ vars.MOBILE_UPDATES_URL }}
          MOBILE_APP_URL: ${{ vars.MOBILE_APP_URL }}
          EXPO_OWNER: ${{ vars.EXPO_OWNER }}
          MOBILE_CLERK_PUBLISHABLE_KEY_STAGING: ${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_STAGING }}
          MOBILE_CLERK_PUBLISHABLE_KEY_PRODUCTION: ${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_PRODUCTION }}
        run: |
          set -euo pipefail
          cd packages/mobile
          pnpm run check:mobile-env

      - name: Setup Expo and EAS
        run: pnpm dlx eas-cli@latest --version

      - name: Trigger Android build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          cd packages/mobile
          pnpm dlx eas-cli@latest build --platform android --profile "${{ steps.target.outputs.profile }}" --non-interactive --wait --json > ../../android-preview-build.json

      - name: Resolve build metadata
        id: buildmeta
        run: |
          set -euo pipefail
          cd ctf

          BUILD_URL=$(node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('android-preview-build.json','utf8')); const arr=Array.isArray(j)?j:[j]; const candidate=arr.find(x=>x?.platform==='ANDROID'||x?.platform==='android')||arr[0]; const url=candidate?.artifacts?.buildUrl||candidate?.artifacts?.applicationArchiveUrl||''; process.stdout.write(url);")
          BUILD_ID=$(node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('android-preview-build.json','utf8')); const arr=Array.isArray(j)?j:[j]; const candidate=arr.find(x=>x?.platform==='ANDROID'||x?.platform==='android')||arr[0]; process.stdout.write(candidate?.id||'');")

          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Comment preview build link on pull request
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          BUILD_URL: ${{ steps.buildmeta.outputs.build_url }}
          BUILD_ID: ${{ steps.buildmeta.outputs.build_id }}
          PROFILE: ${{ steps.target.outputs.profile }}
          CHANNEL: ${{ steps.target.outputs.channel }}
          BRANCH_NAME: ${{ steps.target.outputs.branch_name }}
        with:
          script: |
            const marker = '<!-- expo-preview-build-comment -->';
            const body = [
              marker,
              '### Expo Android Preview Build',
              `- Branch: ${process.env.BRANCH_NAME}`,
              `- EAS profile: ${process.env.PROFILE}`,
              `- EAS channel: ${process.env.CHANNEL}`,
              process.env.BUILD_URL
                ? `- Install APK: ${process.env.BUILD_URL}`
                : '- Install APK: Build completed but URL unavailable in workflow output.',
              process.env.BUILD_ID
                ? `- Build ID: ${process.env.BUILD_ID}`
                : '- Build ID: unavailable'
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
