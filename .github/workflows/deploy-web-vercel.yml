name: Deploy Web to Vercel

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-web-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actions-budget-gate:
    name: Actions Budget Gate
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.budget.outputs.status }}
      enforce_block: ${{ steps.budget.outputs.enforce_block }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate GitHub Actions budget
        id: budget
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS_MONITOR_TOKEN: ${{ secrets.GH_ACTIONS_BILLING_TOKEN }}
          GITHUB_ACTIONS_MONITOR_SCOPE: org
          GITHUB_ACTIONS_BUDGET_MINUTES: "2000"
          GITHUB_ACTIONS_BUDGET_ARTIFACT_MB: "500"
          GITHUB_ACTIONS_BUDGET_CACHE_GB: "10"
          GITHUB_ACTIONS_BUDGET_THRESHOLDS: "60,80,90"
        run: node ctf/scripts/githubActionsBudgetMonitor.mjs

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Run quality checks when scripts exist
        run: |
          set -euo pipefail

          run_script() {
            local script_name="$1"
            local exists
            exists=$(node -e "const p=require('./package.json'); process.stdout.write(p.scripts && p.scripts['${script_name}'] ? 'yes' : 'no')")
            if [ "$exists" = "yes" ]; then
              pnpm run "$script_name"
            else
              echo "Skipping '$script_name' (not defined in ctf/package.json)"
            fi
          }

          run_script lint
          run_script typecheck
          run_script test

  schema-drift-gate:
    name: Schema Drift Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce schema drift policy
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            bash ctf/scripts/check-schema-drift.sh --ref-range "${{ github.event.before }}...${{ github.sha }}"
          else
            bash ctf/scripts/check-schema-drift.sh
          fi

  vercel-deploy:
    name: Vercel Deploy
    runs-on: ubuntu-latest
    needs: [actions-budget-gate, quality-gate, schema-drift-gate]
    if: ${{ needs.actions-budget-gate.outputs.enforce_block != 'true' && needs.quality-gate.result == 'success' && needs.schema-drift-gate.result == 'success' }}
    environment: rewrite-vercel-staging
    # Required secrets in GitHub environment `rewrite-vercel-staging`:
    # - VERCEL_TOKEN
    # - VERCEL_ORG_ID
    # - VERCEL_PROJECT_ID
    #
    # Required Vercel project Production variables for this app:
    # - VERCEL_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY (Vercel-only Clerk project)
    # - VERCEL_CLERK_SECRET_KEY (Vercel-only Clerk project)
    #
    # Separation contract:
    # - Railway runtime uses NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY / CLERK_SECRET_KEY
    # - Vercel design deploy uses VERCEL_* Clerk keys
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          [ -n "$VERCEL_TOKEN" ] || { echo "Missing VERCEL_TOKEN"; exit 1; }
          [ -n "$VERCEL_ORG_ID" ] || { echo "Missing VERCEL_ORG_ID"; exit 1; }
          [ -n "$VERCEL_PROJECT_ID" ] || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build web app on Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
