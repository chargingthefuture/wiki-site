name: Deploy Web to Vercel

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main-quality-gate:
    name: Main Branch Quality Gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Run quality checks when scripts exist
        run: |
          set -euo pipefail

          run_script() {
            local script_name="$1"
            local exists
            exists=$(node -e "const p=require('./package.json'); process.stdout.write(p.scripts && p.scripts['${script_name}'] ? 'yes' : 'no')")
            if [ "$exists" = "yes" ]; then
              pnpm run "$script_name"
            else
              echo "Skipping '$script_name' (not defined in ctf/package.json)"
            fi
          }

          run_script lint
          run_script typecheck
          run_script test

  vercel-deploy:
    name: Vercel Deploy
    runs-on: ubuntu-latest
    needs: [main-quality-gate]
    if: ${{ github.ref != 'refs/heads/main' || needs.main-quality-gate.result == 'success' }}
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          [ -n "$VERCEL_TOKEN" ] || { echo "Missing VERCEL_TOKEN"; exit 1; }
          [ -n "$VERCEL_ORG_ID" ] || { echo "Missing VERCEL_ORG_ID"; exit 1; }
          [ -n "$VERCEL_PROJECT_ID" ] || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            ENVIRONMENT=production
          else
            ENVIRONMENT=preview
          fi
          pnpm dlx vercel pull --yes --environment="$ENVIRONMENT" --token="$VERCEL_TOKEN"

      - name: Build web app on Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"
          else
            pnpm dlx vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy prebuilt artifact to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          else
            pnpm dlx vercel deploy --prebuilt --token="$VERCEL_TOKEN"
          fi
