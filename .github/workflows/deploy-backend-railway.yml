name: Deploy Backend to Railway

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main-quality-gate:
    name: Main Branch Quality Gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Run quality checks when scripts exist
        run: |
          set -euo pipefail

          run_script() {
            local script_name="$1"
            local exists
            exists=$(node -e "const p=require('./package.json'); process.stdout.write(p.scripts && p.scripts['${script_name}'] ? 'yes' : 'no')")
            if [ "$exists" = "yes" ]; then
              pnpm run "$script_name"
            else
              echo "Skipping '$script_name' (not defined in ctf/package.json)"
            fi
          }

          run_script lint
          run_script typecheck
          run_script test

  schema-drift-gate:
    name: Schema Drift Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce schema drift policy
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            bash ctf/scripts/check-schema-drift.sh --ref-range "${{ github.event.before }}...${{ github.sha }}"
          else
            bash ctf/scripts/check-schema-drift.sh --all
          fi

  railway-deploy:
    name: Railway Deploy
    runs-on: ubuntu-latest
    needs: [main-quality-gate, schema-drift-gate]
    if: ${{ needs.schema-drift-gate.result == 'success' && (github.ref != 'refs/heads/main' || needs.main-quality-gate.result == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Validate Railway secret
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "$RAILWAY_TOKEN" ] || { echo "Missing RAILWAY_TOKEN"; exit 1; }

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -d ctf ]; then
            cd ctf
            npm exec --yes @railway/cli@latest -- up --ci
          else
            echo "ctf directory does not exist. Cannot deploy to Railway."
            exit 1
          fi
