name: Deploy Backend to Railway

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-backend-railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actions-budget-gate:
    name: Actions Budget Gate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    outputs:
      status: ${{ steps.budget.outputs.status }}
      enforce_block: ${{ steps.budget.outputs.enforce_block }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate GitHub Actions budget
        id: budget
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS_MONITOR_TOKEN: ${{ secrets.GH_ACTIONS_BILLING_TOKEN }}
          GITHUB_ACTIONS_MONITOR_SCOPE: org
          GITHUB_ACTIONS_BUDGET_MINUTES: "2000"
          GITHUB_ACTIONS_BUDGET_ARTIFACT_MB: "500"
          GITHUB_ACTIONS_BUDGET_CACHE_GB: "10"
          GITHUB_ACTIONS_BUDGET_THRESHOLDS: "60,80,90"
        run: node ctf/scripts/githubActionsBudgetMonitor.mjs

  main-quality-gate:
    name: Main Branch Quality Gate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ctf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Run quality checks when scripts exist
        run: |
          set -euo pipefail

          run_script() {
            local script_name="$1"
            local exists
            exists=$(node -e "const p=require('./package.json'); process.stdout.write(p.scripts && p.scripts['${script_name}'] ? 'yes' : 'no')")
            if [ "$exists" = "yes" ]; then
              pnpm run "$script_name"
            else
              echo "Skipping '$script_name' (not defined in ctf/package.json)"
            fi
          }

          run_script lint
          run_script typecheck
          run_script test

  schema-drift-gate:
    name: Schema Drift Gate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce schema drift policy
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            bash ctf/scripts/check-schema-drift.sh --ref-range "${{ github.event.before }}...${{ github.sha }}"
          else
            bash ctf/scripts/check-schema-drift.sh
          fi

  schema-query-audit:
    name: Schema Query Audit
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run schema query audit
        run: |
          set -euo pipefail
          node ctf/scripts/audit-schema-queries.mjs

  drift-staging:
    name: Drift Check (staging)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING != '' && secrets.DATABASE_URL_STAGING || vars.DATABASE_URL_STAGING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate staging DATABASE_URL secret
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing DATABASE_URL_STAGING in GitHub Actions secrets/variables."
            exit 1
          fi

      - name: Install dependencies
        working-directory: ctf
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm install --frozen-lockfile

      - name: Run live schema drift report (staging)
        working-directory: ctf
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm run schema:report-live-drift | tee ../schema-drift-staging-report.txt

      - name: Upload drift report artifact (staging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-drift-staging-report
          path: schema-drift-staging-report.txt

  drift-production:
    name: Drift Check (production)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || vars.DATABASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate production DATABASE_URL secret
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing DATABASE_URL in GitHub Actions secrets/variables."
            exit 1
          fi

      - name: Install dependencies
        working-directory: ctf
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm install --frozen-lockfile

      - name: Run live schema drift report (production)
        working-directory: ctf
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm run schema:report-live-drift | tee ../schema-drift-production-report.txt

      - name: Upload drift report artifact (production)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-drift-production-report
          path: schema-drift-production-report.txt

  railway-deploy:
    name: Railway Deploy
    runs-on: ubuntu-latest
    needs: [actions-budget-gate, main-quality-gate, schema-drift-gate, schema-query-audit]
    if: ${{ github.event_name != 'schedule' && needs.actions-budget-gate.outputs.enforce_block != 'true' && needs.schema-drift-gate.result == 'success' && needs.schema-query-audit.result == 'success' && (github.ref != 'refs/heads/main' || needs.main-quality-gate.result == 'success') }}
    environment: ${{ github.ref == 'refs/heads/main' && 'rewrite-railway-production' || 'rewrite-railway-staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Validate Railway secret
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "$RAILWAY_TOKEN" ] || { echo "Missing RAILWAY_TOKEN"; exit 1; }

      - name: Validate Clerk env contract for Railway target
        working-directory: ctf
        env:
          CLERK_ENV_TARGET: ${{ github.ref == 'refs/heads/main' && 'railway-production' || 'railway-staging' }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_ENCRYPTION_KEY: ${{ secrets.CLERK_ENCRYPTION_KEY }}
          CLERK_SIGN_IN_URL: ${{ secrets.CLERK_SIGN_IN_URL }}
          RAILWAY_NEXT_PUBLIC_APP_URL: ${{ secrets.RAILWAY_NEXT_PUBLIC_APP_URL }}
        run: |
          set -euo pipefail
          echo "Skipping Clerk environment check as Clerk auth is disabled"

      - name: Build web package before deploy
        working-directory: ctf
        run: |
          set -euo pipefail
          corepack pnpm --filter @ctf/web run build

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -d ctf ]; then
            cd ctf
            npm exec --yes @railway/cli@latest -- up --ci
          else
            echo "ctf directory does not exist. Cannot deploy to Railway."
            exit 1
          fi
