# Content Index — canonical source of truth for the blog article registry.
#
# To ADD a new post:
#   1. Push the markdown file to GitHub Wiki at the slug URL.
#   2. Add an entry below (slug, title, repo, date, excerpt, category).
#   3. pnpm blog:validate
#   4. pnpm blog:sync
#   5. pnpm blog:preview  — check it renders correctly
#   6. pnpm blog:build    — produce deployable static files
#
# For large Quora / Discourse imports see PUBLISHING.md first.
#
# Valid categories:
#   Foundation, Updates, Guides, Platform, Philosophy, Community,
#   Security, Resources, Services, Events, Stories, Technical, Advocacy
#
# Valid repos:
#   chargingthefuture/chargingthefuture  (main wiki)
#   chargingthefuture/mono               (mono repo wiki)

