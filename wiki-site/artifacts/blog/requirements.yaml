packages:
  "react-markdown": "Render raw GitHub wiki markdown to React components"
  "remark-gfm": "Support GitHub Flavored Markdown (tables, strikethrough, tasklists)"
  "framer-motion": "Add gritty, comic-style snap animations and page transitions"
  "date-fns": "Format dates consistently"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to merge tailwind classes safely"

images:
  - path: "artifacts/blog/public/images/hero-bg.png"
    description: "Dark gritty comic book style cityscape in ruins, heavy black ink outlines, blood red skies, halftone dots, high contrast survival aesthetic, graphic novel style"
    aspect_ratio: "16:9"
  - path: "artifacts/blog/public/images/logo-mark.png"
    description: "Bold graffiti style survival emblem logo in blood red and black, stencil art, distressed texture, circular"
    aspect_ratio: "1:1"

notes:
  - App relies purely on GitHub raw content for its articles. No backend server needed.
  - Using a hardcoded list of articles derived from the GitHub wiki.
  - Implements a comic book / graphic novel / Walking Dead aesthetic with harsh shadows and bold fonts.
