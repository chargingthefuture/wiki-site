kind = "web"
previewPath = "/"
title = "Charging The Future Wiki"
version = "1.0.0"
id = "artifacts/wiki"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24722

[services.development]
run = "pnpm --filter @workspace/wiki run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wiki", "run", "build" ]
publicDir = "artifacts/wiki/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24722"
BASE_PATH = "/"
